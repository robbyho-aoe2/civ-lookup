<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AoE Auto Scout — by Fast Castle and Chill</title>
<style>
:root{
  --bg:#0f0d0b;--surf:#1c1814;--surf2:#242018;--border:#332c24;--border2:#4a3f30;
  --amber:#c8922a;--amberL:#f0b458;--amberBg:rgba(200,146,42,.1);
  --text:#ede5d8;--text2:#a8967e;--text3:#6b5840;
  --green:#4ade80;--greenBg:rgba(74,222,128,.07);--greenBd:rgba(74,222,128,.25);
  --red:#f87171;--redBg:rgba(248,113,113,.07);--redBd:rgba(248,113,113,.25);
  --blue:#60a5fa;--purple:#a78bfa;--blueBg:rgba(96,165,250,.12);--purpleBg:rgba(167,139,250,.12);
  --cyan:#22d3ee;--orange:#fb923c;--teal:#34d399;--pink:#f472b6;--yellow:#fbbf24;
  --radius:9px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
#app{max-width:1200px;margin:0 auto;padding:16px 16px 80px;}
header{
  position:relative;
  border-radius:14px;
  margin-bottom:6px;
  background:var(--surf);
  border:1px solid var(--border);
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:12px 16px;
  padding:12px 18px;
}
.header-hero{max-height:340px;height:auto;width:auto;max-width:100%;display:block;flex-shrink:1;}
.header-fclogo{height:80px;width:80px;border-radius:50%;flex-shrink:0;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.4);}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.subtitle{
  font-size:13px;
  color:var(--text3);
  flex-basis:100%;
}
.subtitle a{color:#7fb8e8;text-decoration:none;border-bottom:1px solid rgba(127,184,232,.5);}
.subtitle a:hover{border-color:#7fb8e8;}
@media (min-width:640px){
  .subtitle{flex-basis:auto;margin-left:auto;}
}
@media (max-width:639px){
  .header-hero{max-height:150px;}
  .header-fclogo{height:56px;width:56px;}
}
#loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;}
#loading-overlay.hidden{display:none;}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#error-msg{display:none;font-size:13px;padding:8px 14px;border-radius:var(--radius);margin-bottom:10px;}
/* Search */
.search-row{display:flex;gap:8px;margin-bottom:10px;position:relative;z-index:50;}
.search-wrap{position:relative;flex:1;}
#search-input{width:100%;height:44px;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:0 14px;color:var(--text);font-size:16px;outline:none;}
#search-input:focus{border-color:var(--amber);}
#search-input::placeholder{color:var(--text3);}
#dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surf2);border:1px solid var(--border2);border-radius:var(--radius);max-height:260px;overflow-y:auto;z-index:100;box-shadow:0 16px 40px rgba(0,0,0,.7);}
.drop-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);}
.drop-item:last-child{border-bottom:none;}
.drop-item:hover{background:var(--surf);}
.itype{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.itype.unit{background:var(--blueBg);color:var(--blue);}
.itype.tech{background:var(--purpleBg);color:var(--purple);}
.mode-toggle{display:flex;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0;}
.mode-btn{height:44px;padding:0 16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;font-weight:700;}
.mode-btn.active{background:var(--amber);color:#1a0a00;}
/* Archetypes */
.arch-group-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.arch-pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px;}
.arch-btn{font-size:12px;padding:5px 12px;background:var(--surf);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;transition:.12s;}
.arch-btn:hover{border-color:var(--amber);color:var(--amberL);}
.arch-btn.on{background:var(--amber);color:#1a0a00;border-color:var(--amber);font-weight:700;}
/* Quick filters */
#quick-filters-details{margin-bottom:14px;border:1px solid var(--border);border-radius:12px;padding:10px 12px;background:var(--surf);}
#quick-filters-details[open]{padding-bottom:14px;}
.qf-summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--amberL);list-style:none;user-select:none;}
.qf-summary::-webkit-details-marker{display:none;}
.qf-summary:hover{color:var(--amber);}
.sug-label{font-size:11px;color:var(--text3);margin-bottom:5px;}
#suggestions{margin-bottom:12px;}
.cat-section{margin-bottom:10px;}
.cat-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.cat-btns{display:flex;flex-wrap:wrap;gap:5px;}
.sug-btn{font-size:12px;padding:5px 12px;background:var(--surf);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;transition:.12s;}
.sug-btn:hover{border-color:var(--amber);color:var(--amberL);}
.sug-btn.sug-all{border-color:rgba(74,222,128,.3);}
.sug-btn.sel{font-weight:600;}
.sug-cnt{font-size:9px;margin-left:4px;padding:1px 5px;border-radius:8px;font-weight:700;vertical-align:middle;display:inline-block;}
.sug-cnt.all{background:rgba(74,222,128,.18);color:var(--green);}
.sug-cnt.few{background:rgba(200,146,42,.18);color:var(--amberL);}
/* Chips */
#filter-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;min-height:4px;}
.filter-chip{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px;background:var(--surf);border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;transition:.12s;}
.filter-chip:hover{border-color:var(--red);background:var(--redBg);}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.chip-dot.unit{background:var(--blue);}
.chip-dot.tech{background:var(--purple);}
#status-bar{font-size:12px;color:var(--text3);min-height:18px;margin-bottom:6px;}
/* Grid */
.section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:12px 0 7px;border-top:1px solid var(--border);margin-top:4px;}
.section-hdr.all{color:var(--text3);}
.section-hdr.has{color:var(--green);}
.section-hdr.missing{color:var(--red);opacity:.75;}
.section-hdr.unknown{color:var(--text3);}
.civ-grid{display:grid;gap:7px;grid-template-columns:repeat(2,1fr);}
@media(min-width:480px){.civ-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:640px){.civ-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:860px){.civ-grid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1060px){.civ-grid{grid-template-columns:repeat(6,1fr);}}
.civ-card{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:10px 12px;min-height:52px;cursor:pointer;transition:.12s;}
.civ-card:hover{border-color:var(--amber);}
.civ-card.has{border-color:var(--greenBd);background:var(--greenBg);}
.civ-card.has:hover{border-color:var(--green);}
.civ-card.missing{border-color:var(--redBd);background:var(--redBg);opacity:.65;}
.civ-card.missing:hover{opacity:1;border-color:var(--red);}
.civ-card.partial{border-color:rgba(200,146,42,.35);background:rgba(200,146,42,.07);}
.civ-card.partial:hover{border-color:var(--amber);}
.civ-card.unknown{opacity:.6;}
.civ-card.active{box-shadow:0 0 0 2px var(--amber);border-color:var(--amber) !important;opacity:1 !important;}
.cname{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.ctags{display:flex;flex-wrap:wrap;gap:3px;}
.ctag{font-size:10px;padding:1px 6px;border-radius:7px;}
.ctag.has{background:var(--greenBg);color:var(--green);border:1px solid var(--greenBd);}
.ctag.missing{background:var(--redBg);color:var(--red);border:1px solid var(--redBd);text-decoration:line-through;}
.score-bar-wrap{margin-top:5px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:2px;}
.score-txt{font-size:10px;color:var(--text3);margin-top:2px;display:flex;gap:4px;align-items:center;}
.score-bonus{color:var(--amberL);font-weight:600;}
.wr-mini{font-size:10px;margin-top:3px;display:flex;gap:4px;flex-wrap:wrap;}
.wr-mini-item{display:flex;flex-direction:column;align-items:center;}
.wr-mini-lbl{font-size:8px;color:var(--text3);}
.wr-mini-val{font-size:11px;font-weight:700;}
/* Info panel */
#info-panel{display:none;margin-top:20px;padding:16px;background:var(--surf);border:1px solid var(--border);border-radius:12px;position:relative;}
#info-panel.visible{display:block;}
.close-panel{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;z-index:5;}
.close-panel:hover{color:var(--text);}
/* Tooltip */
#tooltip{display:none;position:fixed;width:340px;background:var(--surf2);border:1px solid var(--border2);border-radius:12px;padding:16px;box-shadow:0 24px 60px rgba(0,0,0,.85);z-index:1000;pointer-events:none;}
/* Info content */
.info-name{font-size:17px;font-weight:700;color:var(--amberL);margin-bottom:4px;}
.info-focus{font-size:12px;color:var(--amber);font-weight:500;margin-bottom:10px;}
.info-sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:10px 0 5px;}
.wr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;text-align:center;}
.wr-lbl{font-size:9px;color:var(--text3);margin-bottom:2px;}
.wr-val{font-size:13px;font-weight:700;}
.wr-val.g{color:var(--green);}.wr-val.r{color:var(--red);}.wr-val.y{color:var(--amberL);}
.bonus-item{font-size:12px;display:flex;gap:7px;margin-bottom:5px;line-height:1.4;align-items:flex-start;}
.bonus-item::before{content:"▸";flex-shrink:0;margin-top:1px;}
.bonus-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;flex-shrink:0;margin-top:3px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px;}
.stat-cell{background:var(--surf);border:1px solid var(--border);border-radius:7px;padding:5px 8px;}
.stat-lbl{font-size:10px;color:var(--text3);}
.stat-val{font-size:14px;font-weight:700;}
.atk-bonus{display:inline-block;font-size:11px;padding:2px 8px;background:rgba(251,191,36,.1);color:#fbbf24;border-radius:20px;margin:2px;}
.cost-row{font-size:12px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;}
.u-chip{font-size:11px;padding:3px 10px;background:var(--greenBg);color:var(--green);border:1px solid var(--greenBd);border-radius:20px;}
#uu-tooltip{position:fixed;z-index:9999;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;max-width:260px;font-size:12px;color:var(--text);pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4);display:none;line-height:1.5;}
#uu-tooltip .tt-name{font-weight:600;color:var(--amberL);margin-bottom:3px;}
#uu-tooltip .tt-desc{color:var(--text2);}
.t-chip{font-size:11px;padding:3px 10px;background:var(--purpleBg);color:var(--purple);border:1px solid rgba(167,139,250,.3);border-radius:20px;}
.civ-pill{font-size:11px;padding:3px 9px;background:var(--surf);border:1px solid var(--border);border-radius:20px;color:var(--text2);}
.ibadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.ibadge.unit{background:var(--blueBg);color:var(--blue);}
.ibadge.tech{background:var(--purpleBg);color:var(--purple);}
/* Archetype checklist */
.arch-items{display:flex;flex-direction:column;gap:2px;margin-top:5px;}
.arch-age-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0 6px;margin-top:5px;}
.arch-age-col{}
.arch-age-hdr{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:2px 0 3px;border-bottom:1px solid var(--border);margin-bottom:3px;text-align:center;}
.arch-item{font-size:11px;display:flex;align-items:flex-start;gap:6px;line-height:1.4;padding:1px 0;}
.arch-item.ai-has{color:var(--green);}
.arch-item.ai-miss{color:var(--red);opacity:.8;}
.arch-item.ai-note{color:var(--amberL);}
.arch-note{font-size:10px;color:var(--text3);font-style:italic;padding-left:14px;}
/* Tech availability table */
.avail-section{margin-bottom:8px;}
.avail-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.avail-items{display:flex;flex-wrap:wrap;gap:3px;}
.avail-item{font-size:11px;padding:2px 7px;border-radius:7px;border:1px solid;}
.avail-item.yes{background:var(--greenBg);color:var(--green);border-color:var(--greenBd);}
.avail-item.no{background:var(--redBg);color:var(--red);border-color:var(--redBd);text-decoration:line-through;opacity:.7;}
/* Arch rankings */
.arch-rank-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
.arch-rank-item{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
/* Footer */
.footer{font-size:11px;color:var(--text3);text-align:center;margin-top:30px;padding-top:16px;border-top:1px solid var(--border);}
.footer a{color:var(--text2);text-decoration:none;}
.footer a:hover{color:var(--amberL);}
.version{font-size:10px;color:var(--text3);margin-top:6px;}
</style>
</head>

/* Auto-compute combined weights as the average across all maps.
   When a new map is added to MAP_TECH_WEIGHTS, this stays current. */
MAP_TECH_WEIGHTS.Combined = (() => {
  const maps = Object.keys(MAP_TECH_WEIGHTS);
  const out = {};
  maps.forEach(map => {
    Object.entries(MAP_TECH_WEIGHTS[map]).forEach(([arch, w]) => {
      out[arch] = (out[arch] || 0) + w;
    });
  });
  Object.keys(out).forEach(arch => out[arch] /= maps.length);
  return out;
})();

const EXTRA_UU_BONUS = {

  ],

function extraUUBonus(civName, archLabel) {
  const cd = civData[civName];
  const rules = EXTRA_UU_BONUS[archLabel];
  if (!cd || !rules) return { pts: 0, notes: [] };
  let pts = 0, notes = [];
  rules.forEach(rule => {
    if (!rule.civs.includes(civName)) return;
    if (rule.ids.some(id => cd.units.has(id))) { pts += 1; notes.push(rule.note); }
  });
  return { pts, notes };
}

/* Every pro player gets a unique emoji — the handful above are manually
   picked and locked in; anyone else lazily draws from this pool. Deter-
   ministic (same roster -> same assignments every render) via a stable
   hash of profileId, walking forward through the pool to the first slot
   not already claimed by another currently-known pro. Kept distinct from
   the manually-picked six above so new pros don't visually clash with them. */
const PRO_EMOJI_POOL = [
  '🦅','🐉','🦁','🐺','🦂','🦈','🐆','🦇','🦉','🦊',
  '🏹','🛡️','⚡','🌪️','🌋','☄️','💎','🗡️','🪓','🏆',
  '🎖️','🥇','🧨','🔱','⚜️','🎲','🃏','🧩','🚀','🛸',
  '🌟','🔮','🧭','🗿','⛏️','🪃','🏔️','🌊','🔨','🎺',
];
function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) | 0; }
  return Math.abs(h);
}
function assignProEmojis(proEntries) {
  // proEntries: [{name, profileId}], sorted by profileId for determinism
  const sorted = [...proEntries].sort((a, b) => a.profileId - b.profileId);
  const claimed = new Set();
  const out = {}; // name -> emoji
  sorted.forEach(({ name, profileId }) => {
    if (EMOJI_MAP[name]) { claimed.add(EMOJI_MAP[name]); out[name] = EMOJI_MAP[name]; return; }
    let idx = simpleHash(String(profileId)) % PRO_EMOJI_POOL.length;
    let tries = 0;
    while (claimed.has(PRO_EMOJI_POOL[idx]) && tries < PRO_EMOJI_POOL.length) {
      idx = (idx + 1) % PRO_EMOJI_POOL.length;
      tries++;
    }
    const emoji = claimed.has(PRO_EMOJI_POOL[idx]) ? DEFAULT_PLAYER_EMOJI : PRO_EMOJI_POOL[idx]; // pool exhausted, extremely unlikely
    claimed.add(emoji);
    out[name] = emoji;
  });
  return out;
}

async function loadPlayerData() {
  try {
    // Cache-bust: raw.githubusercontent.com caches aggressively at both the
    // browser and CDN level, and can serve a stale aggregate.json for a
    // while after a fresh push. A unique query param forces a real fetch.
    const res = await fetch(`${AGGREGATE_URL}?t=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    AGGREGATE = await res.json();

    // Build roster entries for every group marked 'remote' — dynamic, so
    // new auto-discovered players appear with no code changes here.
    const proEmojis = assignProEmojis(
      (AGGREGATE.players || []).filter(p => p.group === 'pro').map(p => ({ name: p.name, profileId: p.profileId }))
    );
    (AGGREGATE.players || []).forEach(p => {
      const src = GROUP_SOURCES[p.group];
      if (!src || src.mode !== 'remote') return;
      if (PLAYER_LIST.some(e => e.key === p.name)) return; // don't duplicate
      const groupDefault = p.group === 'streamer' ? STREAMER_DEFAULT_EMOJI : p.group === 'pc' ? PC_DEFAULT_EMOJI : DEFAULT_PLAYER_EMOJI;
      const emoji = p.group === 'pro' ? (proEmojis[p.name] || groupDefault) : (EMOJI_MAP[p.name] || groupDefault);
      PLAYER_LIST.push({
        emoji,
        label: p.name,
        key: p.name,
        source: 'remote',
        group: p.group,
        profileId: p.profileId,
        ratings: p.ratings || {},
        totalGames: p.totalGames || 0,
      });
    });

    playerDataLoaded = true;
    invalidateGradeCaches();
    render();
  } catch(e) {
    playerDataLoaded = false;
    const el = document.getElementById('error-msg');
    el.style.color = 'var(--red)';
    el.style.background = 'var(--redBg)';
    el.style.borderColor = 'var(--redBd)';
    el.textContent = 'Could not load player data — console stats unavailable this session.';
    el.style.display = 'block';
  }
}

function parseRaw(raw) {
  const du = raw?.data?.Unit || {};
  const dt = raw?.data?.Tech || {};
  const civObj = raw?.civs || {};
  Object.entries(du).forEach(([id, u]) => { unitsById[+id] = u; });
  Object.entries(dt).forEach(([id, t]) => { techsById[+id] = t; });
  Object.entries(civObj).forEach(([name, c]) => {
    civData[name] = {
      units: new Set((c.Unit || []).map(Number)),
      techs: new Set((c.Tech || []).map(Number)),
    };
  });
  // The live SiegeEngineers data source still keys this civ as "Mayans"
  // (the underlying game's internal name), but the app renamed it to "Maya"
  // everywhere else — alias the fetched entry so lookups match.
  if (civData['Mayans'] && !civData['Maya']) {
    civData['Maya'] = civData['Mayans'];
    delete civData['Mayans'];
  }
  const list = [
    ...Object.entries(UNIT_IDS).map(([name, id]) => {
      const ids = Array.isArray(id) ? id : [id];
      return { id: ids[0], ids, name, itemType: 'unit', data: unitsById[ids[0]] || null };
    }),
    ...Object.entries(TECH_IDS).map(([name, id]) => ({ id, ids: [id], name, itemType: 'tech', data: techsById[id] || null })),
  ].sort((a, b) => a.name.localeCompare(b.name));
  searchIdx = list;
}

/* ================================================================
   SCORING & FILTERING
   ================================================================ */
function hasIds(cd, ids, type) {
  const idArr = Array.isArray(ids) ? ids : [ids];
  return type === 'unit' ? idArr.some(i => cd.units.has(i)) : idArr.some(i => cd.techs.has(i));
}

/* Canonical equivalence groups, built once from every archetype item's own
   {id, extra} definition (the same data that already powers the archetype
   checklists) — e.g. Paladin's group is [569,1813,1944,1946,1134,1372,2568,
   1753], covering every civ's real equivalent (Savar, Hei Guang, Elite
   Battle Elephant, Elite Steppe Lancer, Elite Kona, Elite Shrivamsha
   Rider...). This lets "does this civ have X" checks anywhere in the app —
   not just inside an active archetype's checklist — recognize a civ's real
   equivalent unit instead of just its literal ID. Kept separate by type
   (unit vs tech) since the same numeric ID space isn't shared between them. */
let _equivGroups = null;
function equivalenceGroups() {
  if (_equivGroups) return _equivGroups;
  const groups = { unit: new Map(), tech: new Map() };
  CIV_ARCHETYPES.forEach(arch => {
    arch.items.forEach(it => {
      if (!it.extra || !it.extra.length) return;
      const baseIds = Array.isArray(it.id) ? it.id : [it.id];
      const fullGroup = [...new Set([...baseIds, ...it.extra])];
      const table = groups[it.t];
      fullGroup.forEach(id => {
        const existing = table.get(id);
        if (existing) fullGroup.forEach(x => existing.add(x));
        else table.set(id, new Set(fullGroup));
      });
    });
  });
  _equivGroups = groups;
  return groups;
}

/* Given the ids a search item/checklist entry is defined by, return the
   full equivalence-expanded id list (itself plus anything any civ uses as
   a real substitute) — falls back to the original ids untouched if no
   equivalence group is registered for it. */
function expandWithEquivalents(ids, type) {
  const idArr = Array.isArray(ids) ? ids : [ids];
  const table = equivalenceGroups()[type];
  const out = new Set(idArr);
  idArr.forEach(id => {
    const group = table.get(id);
    if (group) group.forEach(x => out.add(x));
  });
  return [...out];
}

/* Same as hasIds, but equivalence-aware — a civ "has" a unit/tech if it has
   the literal item OR any registered real equivalent for it. Returns which
   id actually matched (for showing an equivalence note), or null. */
function hasIdsEquiv(cd, ids, type) {
  const idArr = Array.isArray(ids) ? ids : [ids];
  const baseHit = idArr.find(i => type === 'unit' ? cd.units.has(i) : cd.techs.has(i));
  if (baseHit != null) return { has: true, matchedId: baseHit, viaEquivalent: false };
  const expanded = expandWithEquivalents(idArr, type);
  const equivHit = expanded.find(i => !idArr.includes(i) && (type === 'unit' ? cd.units.has(i) : cd.techs.has(i)));
  if (equivHit != null) return { has: true, matchedId: equivHit, viaEquivalent: true };
  return { has: false, matchedId: null, viaEquivalent: false };
}

/* Tech-tree completeness score for an archetype item list (units/techs only) */
function techScoreCiv(civName, arch) {
  const cd = civData[civName];
  if (!cd) return 0;

  // Gunpowder special case: a civ with neither Hand Cannoneer nor Bombard
  // Cannon has no real gunpowder identity — score 0/4 outright rather than
  // give partial credit for Chemistry or Ring Archer Armor alone. And Ring
  // Archer Armor only matters to a civ that can actually train Hand
  // Cannoneers to benefit from it, so it's excluded for civs lacking that
  // unit specifically (even if they do have Bombard Cannon).
  if (arch.label === 'Gunpowder') {
    const hasHC = cd.units.has(5);
    const hasBC = cd.units.has(36);
    if (!hasHC && !hasBC) return 0;
    return arch.items.filter(it => {
      if (it.t === 'tech' && it.id === 219 && !hasHC) return false; // Ring Archer Armor
      const ids = Array.isArray(it.id) ? it.id : [it.id];
      const allIds = it.extra ? [...ids, ...it.extra] : ids;
      return it.t === 'unit' ? allIds.some(id => cd.units.has(id)) : allIds.some(id => cd.techs.has(id));
    }).length;
  }

  return arch.items.filter(it => {
    const ids = Array.isArray(it.id) ? it.id : [it.id];
    const allIds = it.extra ? [...ids, ...it.extra] : ids;
    return it.t === 'unit' ? allIds.some(id => cd.units.has(id)) : allIds.some(id => cd.techs.has(id));
  }).length;
}

function applyBonusOverride(text, cats) {
  const rule = BONUS_CATEGORY_OVERRIDE[text];
  if (!rule) return cats;
  let out = cats.filter(c => !(rule.exclude || []).includes(c));
  (rule.include || []).forEach(c => { if (!out.includes(c)) out.push(c); });
  return out;
}

/* Rule-based bonus scoring:
     +2 per civ bonus that classifies into this archetype's category
     +2 for the team bonus, if it classifies into this category
     +2 for each relevant Castle/Imperial unique tech (both count equally)
     +1 per unique unit tagged with this category (also covers Monastery
        Unique Units and the Fortified Church unique-Relic bonus, which are
        tagged the same way as any other unique unit)
   Manual adjustments (verified exceptions like Spanish lacking Crossbowman,
   or Portuguese's Feitoria) are added on top. */
function bonusScoreCiv(civName, arch) {
  const label = arch.label;
  let pts = 0;
  const notes = [];

  (CB[civName] || []).forEach(b => {
    const cats = applyBonusOverride(b, classifyBonusCategories(b));
    if (cats.includes(label)) { pts += 2; notes.push(b); }
  });

  const team = TEAM_BONUS[civName];
  if (team) {
    const cats = applyBonusOverride(team, classifyBonusCategories(team));
    if (cats.includes(label)) { pts += 2; notes.push(`Team bonus: ${team}`); }
  }

  const uts = UNIQUE_TECHS[civName] || [];
  uts.forEach((techName) => {
    const desc = UNIQUE_TECH_DESCRIPTIONS[techName] || '';
    let cats = classifyBonusCategories(techName + ' ' + desc);
    const override = UNIQUE_TECH_CATEGORY_OVERRIDE[techName];
    if (override) {
      cats = cats.filter(c => !(override.exclude || []).includes(c));
      (override.include || []).forEach(c => { if (!cats.includes(c)) cats.push(c); });
    }
    const extra = TECH_EXTRA_CATEGORY[techName] || [];
    const relevant = cats.includes(label) || extra.includes(label);
    if (relevant) {
      // Both the Castle and Imperial unique tech are worth +2 — a civ's two
      // signature techs matter roughly equally, not tapered by tier.
      pts += 2;
      notes.push(`${techName}${desc ? ': ' + desc : ''}`);
    }
  });

  const uu = (UNIQUE_UNITS[civName] || '').split(',').map(s => s.trim()).filter(Boolean);
  uu.forEach(name => {
    const cats = UNIQUE_UNIT_CATEGORY[name] || [];
    if (cats.includes(label)) { pts += 1; notes.push(`${name} Unique Unit`); }
  });

  const manual = manualAdjustment(civName, label);
  pts += manual.pts;
  notes.push(...manual.notes);

  // Any civ that can't reach Arbalester is meaningfully behind as a pure
  // archer civ — applied programmatically rather than per-civ authored data,
  // since it's a direct tech-tree fact, not a judgment call.
  if (label === 'Archer') {
    const cd = civData[civName];
    if (cd && !cd.units.has(492)) {
      pts -= 1;
      notes.push('No Arbalester upgrade available');
    }
  }

  return { pts, notes };
}

function totalScoreCiv(civName, arch) {
  const tech = techScoreCiv(civName, arch);
  const bonus = bonusScoreCiv(civName, arch);
  const extraUU = extraUUBonus(civName, arch.label);
  const bonusPts = bonus.pts + extraUU.pts;
  return { tech, bonusPts, total: tech + bonusPts, notes: [...bonus.notes, ...extraUU.notes] };
}

function archetypeCivList(arch) {
  return arch.restrictTo ? arch.restrictTo : ALL_CIVS;
}

function civStatus(civ) {
  if (!selected.length) return 'neutral';
  const cd = civData[civ];
  if (!cd) return 'unknown';
  const results = selected.map(item => hasIds(cd, item.ids || [item.id], item.itemType));
  if (mode === 'ALL') return results.every(Boolean) ? 'has' : 'missing';
  return results.some(Boolean) ? 'has' : 'missing';
}

function civMatchCount(civ) {
  const cd = civData[civ];
  if (!cd) return 0;
  return selected.filter(item => hasIds(cd, item.ids || [item.id], item.itemType)).length;
}

/* Compute a civ's rank (1 = best) within a given archetype, using total score.
   Uses competition ranking (1224): rank = number of civs with a strictly
   higher score + 1, so tied civs always share the same rank number. */
function archetypeRank(civName, archIdx) {
  const arch = CIV_ARCHETYPES[archIdx];
  const pool = archetypeCivList(arch);
  if (!pool.includes(civName)) return null;
  const civScore = totalScoreCiv(civName, arch).total;
  const rank = pool.filter(c => totalScoreCiv(c, arch).total > civScore).length + 1;
  return { rank, of: pool.length };
}

/* Export archetype ranks for all civs — copies JSON to clipboard */
function exportArchetypeRanks() {
  if (!dataLoaded) { alert('Tech tree data not loaded yet — wait a moment and try again.'); return; }
  const out = {};
  ALL_CIVS.forEach(civ => {
    out[civ] = {};
    CIV_ARCHETYPES.forEach((arch, i) => {
      const pool = archetypeCivList(arch);
      if (!pool.includes(civ)) return;
      const r = archetypeRank(civ, i);
      const s = totalScoreCiv(civ, arch);
      if (r) out[civ][arch.label] = { rank: r.rank, of: r.of, score: s.total };
    });
  });
  const json = JSON.stringify(out, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const btn = document.getElementById('export-ranks-btn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => btn.textContent = '📋 Export ranks', 2000); }
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = json; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    const btn = document.getElementById('export-ranks-btn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => btn.textContent = '📋 Export ranks', 2000); }
  });
}


/* ─── Civ Similarity ───────────────────────────────────────────
   Each civ is represented as a 12-D archetype score vector.
   Similarity = cosine similarity between vectors (0–1 → 0–100%). */
let _simVecCache = {};
function civSimVector(civName) {
  if (_simVecCache[civName]) return _simVecCache[civName];
  const vec = CIV_ARCHETYPES.map((arch, i) => {
    const pool = archetypeCivList(arch);
    if (!pool.includes(civName)) return 0;
    const r = archetypeRank(civName, i);
    if (!r || r.of <= 1) return 0.5;
    // Invert rank so rank 1 = 1.0 (best), rank last = 0.0 (worst)
    return 1 - (r.rank - 1) / (r.of - 1);
  });
  _simVecCache[civName] = vec;
  return vec;
}

function cosineSim(a, b) {
  let dot = 0, magA = 0, magB = 0;
  for (let i = 0; i < a.length; i++) {
    dot  += a[i] * b[i];
    magA += a[i] * a[i];
    magB += b[i] * b[i];
  }
  return (magA && magB) ? dot / (Math.sqrt(magA) * Math.sqrt(magB)) : 0;
}

function topSimilarCivs(civName, n = 6) {
  if (!dataLoaded) return [];
  const vecA = civSimVector(civName);
  return ALL_CIVS
    .filter(c => c !== civName)
    .map(c => ({ civ: c, pct: Math.round(cosineSim(vecA, civSimVector(c)) * 100) }))
    .sort((a, b) => b.pct - a.pct)
    .slice(0, n);
}

function invalidateSimCache() { _simVecCache = {}; }

function isSelected(item) {

  // If a tier list or player is active, clear it so the tech result takes over
  if (activeArchetype !== null || activeMap !== null || activePlayer !== null || activeGroupOverall !== null || activeOverallTier) {
    activeArchetype = null; activeMap = null; activePlayer = null;
    activeGroupOverall = null; activeOverallTier = false; activePlayerMapFilter = null; activeMapCatFilter = null; activeMapOverall = null;
  }
  const ids = item.ids || [item.id];
  const civsWith = new Set(ALL_CIVS.filter(civ => {
    const cd = civData[civ];
    if (!cd) return false;
    return item.itemType === 'unit' ? ids.some(id => cd.units.has(id)) : ids.some(id => cd.techs.has(id));
  }));
  const fullData = item.itemType === 'unit' ? unitsById[item.id] : techsById[item.id];
  selected.push({ ...item, civsWith, data: fullData || {} });

  render();
  showItemInfo(selected.length - 1);

/* Whatever group is currently being viewed — an individual player's group,
   or the group behind an active Group Overall — or null if neither. Used
   to decide whether switching selection should reset the ladder pill:
   same group keeps whatever ladder was manually chosen, different group
   (console -> pro, etc.) resets to that group's sensible default. */
function getCurrentEffectiveGroup() {
  if (activePlayer !== null) return PLAYER_LIST[activePlayer]?.group ?? null;
  if (activeGroupOverall !== null) return activeGroupOverall;
  return null;
}

function selectPlayer(idx) {
  const wasMapFilter = activePlayerMapFilter;
  const prevGroup = getCurrentEffectiveGroup();
  activeGroupOverall = null;
  if (activePlayer === idx) { activePlayer = null; activePlayerMapFilter = null; activeMapCatFilter = null; }
  else {
    activePlayer = idx; activeArchetype = null; activeMap = null; activeOverallTier = false; activeConsoleElo = null; activePcElo = null; activeMapOverall = null;
    const entry = PLAYER_LIST[idx];
    if (prevGroup !== entry.group) activeLadder = GROUP_DEFAULT_LADDER[entry.group] || activeLadder;
    // Remote players: kick off the lazy fetch if we don't have them cached
    // yet. render() below shows a loading state immediately; once the
    // fetch resolves we render() again and everything downstream (which
    // reads getPlayerMatches synchronously from the now-populated cache)
    // just works with no further plumbing.
    if (entry.source === 'remote' && !_remotePlayerCache[entry.profileId]) {
      fetchRemotePlayerData(entry.group, entry.profileId).then(() => {
        if (activePlayer === idx) render(); // only re-render if still viewing this player
      });
    }
    // Keep the map filter across player switches when possible — only
    // clear it if the newly-selected player has no data for that map
    // (under whatever ladder is currently active) rather than always
    // resetting to "no filter" on every switch.
    if (wasMapFilter) {
      const stillValid = getPlayerMapList(PLAYER_LIST[idx].key, activeLadder).some(m => m.map === wasMapFilter);
      activePlayerMapFilter = stillValid ? wasMapFilter : null;
    }
  }
  render();
}

function selectGroupOverall(group) {
  const prevGroup = getCurrentEffectiveGroup();
  if (activeGroupOverall === group) {
    activeGroupOverall = null; activePlayerMapFilter = null; activeMapCatFilter = null;
    activeConsoleElo = null; activePcElo = null;
  }
  else {
    activeGroupOverall = group; activePlayer = null; activeArchetype = null; activeMap = null; activeOverallTier = false; activeMapOverall = null;
    if (prevGroup !== group) activeLadder = GROUP_DEFAULT_LADDER[group] || activeLadder;
    // ELO brackets are group-specific pills — whichever group we're NOT
    // viewing anymore should never stay lit up as "selected" underneath.
    if (group !== 'console') activeConsoleElo = null;
    if (group !== 'pc') activePcElo = null;
    // Map filter carries over as-is; renderGroupOverallGrid re-derives the
    // map list fresh from that whole group's players combined, so an
    // invalid/no-longer-present map just naturally yields no filtering.
  }
  render();
}
