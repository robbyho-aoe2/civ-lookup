    .sort((a, b) => {
      const ra = playerConsoleRating(a.p) ?? -1;
      const rb = playerConsoleRating(b.p) ?? -1;
      return rb - ra;
    });
  const pcPlayers = PLAYER_LIST.map((p, i) => ({ p, i })).filter(x => x.p.group === 'pc')
    .sort((a, b) => (playerDisplayRating(b.p) ?? -1) - (playerDisplayRating(a.p) ?? -1));
  const streamerPlayers = PLAYER_LIST.map((p, i) => ({ p, i })).filter(x => x.p.group === 'streamer')
    .sort((a, b) => (playerDisplayRating(b.p) ?? -1) - (playerDisplayRating(a.p) ?? -1));
  const renderPlayerGroup = (label, entries, extraFirstPill, groupKey) => {
    const pills = entries.map(({ p, i }) => {
      const on = activePlayer === i ? ' on' : '';
      const rating = playerDisplayRating(p);
      const ratingTag = rating != null ? ` <span style="opacity:.65">(${rating})</span>` : '';
      return `<button class="arch-btn${on}" data-kind="player" data-i="${i}" data-name="${p.label.toLowerCase()}" data-group="${groupKey}">${p.emoji} ${p.label}${ratingTag}</button>`;
    }).join('');
    const expanded = playerGroupsExpanded[groupKey];
    const rowH = expanded ? '152px' : '40px';
    const rowOverflow = expanded ? 'auto' : 'hidden';
    const toggleLbl = expanded ? '▲ collapse' : `▼ +${entries.length} players`;
    const searchBar = groupKey === 'console' ? `<input type="text" id="console-player-search" placeholder="Search console players…" style="height:26px;padding:0 8px;background:var(--surf);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:11px;outline:none;width:160px;margin-top:4px">` : '';
    // PC/Streamer sections stay visible even with 0 players — better to
    // show "no players yet" than silently disappear once they're added.
    return `<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:6px">${label}</div>${searchBar}
      <div class="arch-pill-row player-pill-scroll" style="max-height:${rowH};overflow-y:${rowOverflow};overflow-x:hidden;padding-right:2px">${extraFirstPill || ''}${pills}</div>
      <button data-kind="togglegroup" data-group="${groupKey}" style="font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 4px;margin-top:1px">${toggleLbl}</button>`;
  };
  const proOverallOn = activeGroupOverall === 'pro' ? ' on' : '';
  const proOverallPill = `<button class="arch-btn${proOverallOn}" data-kind="groupoverall" data-group="pro" data-name="pro overall" style="font-weight:700">🏆 Pro Overall</button>`;
  const consoleOverallOn = activeGroupOverall === 'console' ? ' on' : '';
  const consoleOverallPill = `<button class="arch-btn${consoleOverallOn}" data-kind="groupoverall" data-group="console" data-name="console overall" style="font-weight:700">🎮 Console Overall</button>` +
    Object.entries(CONSOLE_ELO_BRACKETS).map(([key, b]) => {
      const on = activeConsoleElo === key ? ' on' : '';
      return `<button class="arch-btn${on}" data-kind="consoleelo" data-elo="${key}" style="font-size:11px">${b.label}</button>`;
    }).join('');
  const pcOverallOn = activeGroupOverall === 'pc' ? ' on' : '';
  const pcLadderValid = ['PC','1v1 PC','Team PC'].includes(activeLadder);
  const pcEloHasData = Object.values(AGGREGATE?.pc?.byEloBracket || {}).some(b => Object.keys(b).length > 0);
  const pcEloDisabled = !pcLadderValid || !pcEloHasData;
  const pcEloDisabledAttrs = pcEloDisabled
    ? ` disabled title="${!pcEloHasData ? 'No PC ELO bracket data yet' : 'Switch to a PC ladder (1v1 PC / Team PC / PC) to use ELO brackets'}" style="font-size:11px;opacity:.4;cursor:not-allowed"`
    : ' style="font-size:11px"';
  const pcOverallPill = pcPlayers.length ? (`<button class="arch-btn${pcOverallOn}" data-kind="groupoverall" data-group="pc" data-name="pc overall" style="font-weight:700">🖥️ PC Overall</button>` +
    Object.entries(PC_ELO_BRACKETS).map(([key, b]) => {
      const on = activePcElo === key ? ' on' : '';
      return `<button class="arch-btn${on}" data-kind="pcelo" data-elo="${key}"${pcEloDisabledAttrs}>${b.label}</button>`;
    }).join('')) : '';
  html += `<div id="player-pill-row">`;
  html += renderPlayerGroup('Pro Players', proPlayers, proOverallPill, 'pro');
  html += renderPlayerGroup('Streamers', streamerPlayers, null, 'streamer');
  html += renderPlayerGroup('PC Players', pcPlayers, pcOverallPill, 'pc');
  html += renderPlayerGroup('Console Players — sorted by 1v1 Console rating', consolePlayers, consoleOverallPill, 'console');
  html += `</div>`;
  html += `<div id="player-request-note" style="display:none;margin:8px 0 8px;padding:10px 12px;background:var(--amberBg);border:1px solid var(--amber);border-radius:10px;font-size:12px;color:var(--text2)"></div>`;
  const activePlayerEntry = activePlayer !== null ? PLAYER_LIST[activePlayer] : null;
  if ((activePlayerEntry && (activePlayerEntry.source === 'match' || activePlayerEntry.source === 'remote')) || activeGroupOverall) {
    html += `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px">`;
    html += `<span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Ladder:</span>`;
    LADDER_OPTIONS.forEach(l => {
      const on = activeLadder === l ? ' on' : '';
      html += `<button class="arch-btn${on}" data-kind="ladder" data-ladder="${l}" style="font-size:11px;padding:3px 10px">${l}</button>`;
    });
    html += `</div>`;
    html += `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px">`;
    const allOn = activeRecencyMode === 'all' ? ' on' : '';
    const patchOn = activeRecencyMode === 'patch' ? ' on' : '';
    const formOn = activeRecencyMode === 'form' ? ' on' : '';
    html += `<button class="arch-btn${allOn}" data-kind="recencymode" data-mode="all" style="font-size:11px;padding:3px 10px">🕰 All Time</button>`;
    html += `<button class="arch-btn${patchOn}" data-kind="recencymode" data-mode="patch" style="font-size:11px;padding:3px 10px">🩹 Current patch only</button>`;
    html += `<button class="arch-btn${formOn}" data-kind="recencymode" data-mode="form" style="font-size:11px;padding:3px 10px">📈 Recent games weighted more</button>`;
    html += `</div>`;
  }
  if (activePlayer !== null || activeGroupOverall !== null) {
    html += `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:4px">`;
    html += `<span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Min. games per civ:</span>`;
    MIN_GAMES_OPTIONS.forEach(opt => {
      const on = activeMinGames === opt.value ? ' on' : '';
      html += `<button class="arch-btn${on}" data-kind="mingames" data-value="${opt.value}" style="font-size:11px;padding:3px 10px">${opt.label}</button>`;
    });
    html += `</div>`;
  }
  return html;
}

function attachSelectorPillEvents(root) {
  root.querySelectorAll('[data-kind]').forEach(btn => {
    btn.addEventListener('click', () => {
      const kind = btn.dataset.kind;
      if (kind === 'archetype') selectArchetype(+btn.dataset.i);
      else if (kind === 'mapcat') { activeMapCategory = btn.dataset.cat; render(); }
      else if (kind === 'map') selectMap(+btn.dataset.i);
      else if (kind === 'player') selectPlayer(+btn.dataset.i);
      else if (kind === 'groupoverall') selectGroupOverall(btn.dataset.group);
      else if (kind === 'mingames') selectMinGames(+btn.dataset.value);
      else if (kind === 'ladder') selectLadder(btn.dataset.ladder);
      else if (kind === 'recencymode') selectRecencyMode(btn.dataset.mode);
      else if (kind === 'consoleelo') {
        const elo = btn.dataset.elo;
        const prevGroup = getCurrentEffectiveGroup();
        activeConsoleElo = activeConsoleElo === elo ? null : elo;
        activePcElo = null;
        if (activeConsoleElo) {
          activeGroupOverall = 'console';
          activeArchetype = null; activeMap = null; activeOverallTier = false;
          activePlayer = null; activeMapOverall = null;
          if (prevGroup !== 'console') activeLadder = GROUP_DEFAULT_LADDER.console;
          // Form/Patch and ELO bracket are separate single-dimension slices
          // in the aggregate (no combined "form-weighted, this bracket only"
          // data) — reset Form so clicking a bracket reliably shows
          // bracket-filtered results instead of Form silently winning
          // precedence and making the bracket click look like a no-op.
          if (activeRecencyMode === 'form') activeRecencyMode = 'all';
        }
        render();
      }
      else if (kind === 'pcelo') {
        const elo = btn.dataset.elo;
        const prevGroup = getCurrentEffectiveGroup();
        activePcElo = activePcElo === elo ? null : elo;
        activeConsoleElo = null;
        if (activePcElo) {
          activeGroupOverall = 'pc';
          activeArchetype = null; activeMap = null; activeOverallTier = false;
          activePlayer = null; activeMapOverall = null;
          if (prevGroup !== 'pc') activeLadder = GROUP_DEFAULT_LADDER.pc;
          if (activeRecencyMode === 'form') activeRecencyMode = 'all';
        }
        render();
      }
      else if (kind === 'togglegroup') { playerGroupsExpanded[btn.dataset.group] = !playerGroupsExpanded[btn.dataset.group]; render(); }
      else if (kind === 'playermap') selectPlayerMapFilter(btn.dataset.map);
      else if (kind === 'mapoverall') {
        const map = btn.dataset.map;
        activeMapOverall = activeMapOverall === map ? null : map;
        if (activeMapOverall) { activeArchetype = null; activeMap = null; activeOverallTier = false; activePlayer = null; activeGroupOverall = null; }
        else activeOverallTier = true;
        render();
      }
      else selectOverallTier();
    });
  });
  const consolePSearch = root.querySelector('#console-player-search');
  if (consolePSearch) {
    consolePSearch.addEventListener('input', () => {
      const q = consolePSearch.value.toLowerCase().trim();
      root.querySelectorAll('.arch-btn[data-group="console"]').forEach(btn => {
        btn.style.display = (!q || (btn.dataset.name || '').includes(q)) ? '' : 'none';
      });
    });
  }
  const mapFilterDetails = root.querySelector('[data-map-filter]');
  if (mapFilterDetails) {
    mapFilterDetails.addEventListener('toggle', () => { mapFilterDetailsOpen = mapFilterDetails.open; });
  }
  const mapFilterSearch = root.querySelector('#map-filter-search');
  const mapCategoryRow = root.querySelector('[data-map-category-row]');
  const applyMapPillFilters = () => {
    const q = mapFilterSearch ? mapFilterSearch.value.toLowerCase().trim() : '';
    const catList = activeMapCatFilter ? PLAYER_MAP_CATEGORIES[activeMapCatFilter] : null;
    root.querySelectorAll('[data-map-pill-row] .arch-btn').forEach(btn => {
      const name = btn.dataset.name || '';
      const matchesSearch = !q || name.includes(q);
      const matchesCategory = !catList || catList.includes(name);
      btn.style.display = (matchesSearch && matchesCategory) ? '' : 'none';
    });
  };
  if (mapFilterSearch) {
    mapFilterSearch.addEventListener('input', applyMapPillFilters);
    // Clicking into the search box shouldn't re-trigger the <details>
    // toggle handler firing on unrelated re-renders — no-op needed here,
    // native <input> click already stops propagation to <summary>.
  }
  if (mapCategoryRow) {
    mapCategoryRow.querySelectorAll('[data-map-cat]').forEach(catBtn => {
      const isActive = catBtn.dataset.mapCat === activeMapCatFilter;
      catBtn.style.background = isActive ? 'var(--amberBg)' : 'var(--surf)';
      catBtn.style.borderColor = isActive ? 'var(--amber)' : 'var(--border)';
      catBtn.style.color = isActive ? 'var(--amberL)' : 'var(--text2)';
      catBtn.addEventListener('click', () => {
        const key = catBtn.dataset.mapCat;
        activeMapCatFilter = activeMapCatFilter === key ? null : key;
        mapCategoryRow.querySelectorAll('[data-map-cat]').forEach(b => {
          const on = b.dataset.mapCat === activeMapCatFilter;
          b.style.background = on ? 'var(--amberBg)' : 'var(--surf)';
          b.style.borderColor = on ? 'var(--amber)' : 'var(--border)';
          b.style.color = on ? 'var(--amberL)' : 'var(--text2)';
        });
        applyMapPillFilters();
      });
    });
  }
  // Re-apply on every render (not just on click) so the category filter
  // survives switching ELO bracket, player, or group — same persistence
  // model as activePlayerMapFilter and mapFilterDetailsOpen.
  if (mapCategoryRow) applyMapPillFilters();
  const searchEl = root.querySelector('#player-search');
  const noteEl = root.querySelector('#player-request-note');
  if (searchEl) {
    searchEl.addEventListener('input', () => {
      const q = searchEl.value.toLowerCase().trim();
      let anyVisible = false;
      root.querySelectorAll('#player-pill-row .arch-btn').forEach(btn => {
        const match = !q || btn.dataset.name.includes(q);
        btn.style.display = match ? '' : 'none';
        if (match) anyVisible = true;
      });
      if (noteEl) {
        if (q && !anyVisible) {
          const DISCORD_INVITE = 'https://discord.gg/rYuTAhbc99';
          const requestText = `Hey Robby — can you add "${searchEl.value.trim()}" to the civ tool's Players list? Their aoe2insights.com profile: [paste link here]`;
          noteEl.style.display = 'block';
          noteEl.innerHTML = `
            <b style="color:var(--amberL)">"${searchEl.value.trim()}" isn't loaded yet.</b>
            This tool can't search players live — but if you find their profile at
            <a href="https://www.aoe2insights.com/" target="_blank" style="color:var(--amberL)">aoe2insights.com</a>
            (search their name there, copy the profile URL), drop a request in the Discord and Robby can get them added — same real data as everyone else here, just a manual one-time pull.
            <div style="margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              <a href="${DISCORD_INVITE}" target="_blank" style="font-size:11px;padding:4px 10px;background:#5865F2;color:#fff;border-radius:20px;font-weight:700;text-decoration:none;display:inline-block">💬 Request in Discord</a>
              <button id="copy-player-request" style="font-size:11px;padding:4px 10px;background:var(--amber);color:#1a0a00;border:none;border-radius:20px;font-weight:700;cursor:pointer">📋 Copy request message</button>
              <span id="copy-player-request-status" style="font-size:11px;color:var(--text3)"></span>
            </div>`;
          const copyBtn = noteEl.querySelector('#copy-player-request');
          if (copyBtn) {
            copyBtn.addEventListener('click', () => {
              const status = noteEl.querySelector('#copy-player-request-status');
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(requestText)
                  .then(() => { if (status) status.textContent = 'Copied! Paste it in Discord.'; })
                  .catch(() => { if (status) status.textContent = requestText; });
              } else if (status) {
                status.textContent = requestText;
              }
            });
          }
        } else {
          noteEl.style.display = 'none';
          noteEl.innerHTML = '';
        }
      }
    });
  }
}

/* ================================================================
   ARCHETYPE GRID RENDERING
   ================================================================ */
function civScoreClass(score, max) {
  const pct = max > 0 ? score / max : 0;
  return pct >= 0.8 ? 'has' : pct >= 0.5 ? 'partial' : 'missing';
}

function scoreLabel(scoreObj, max) {
  let s = `${scoreObj.tech}/${max}`;
  if (scoreObj.bonusPts > 0) s += ` <span class="score-bonus">+${scoreObj.bonusPts} bonus</span>`;
  return s;
}

const TIER_ORDER = ['S','A','B','C','D','F'];

/* Shared tier-list renderer — used for the default Tier List Overall view,
   every tech-tree archetype ranking, and every game-timing ranking. All
   three modes group civs into S/A/B/C/D/F sections with tier-navigation
   pills at the top; only the grade/value lookup and header text differ. */
function renderTierListShared(opts) {
  const { pool, gradeOf, valueOf, valueLabel, headerHtml, subHeaderHtml, clearLabel } = opts;

  const byGrade = {};
  TIER_ORDER.forEach(g => byGrade[g] = []);
  pool.forEach(c => {
    const g = gradeOf(c);
    if (g) byGrade[g].push(c);
  });
  TIER_ORDER.forEach(g => {
    byGrade[g].sort((a, b) => valueOf(b) - valueOf(a) || a.localeCompare(b));
  });

  // Selector pills live here now — same spot the old S/A/B/C/D/F
  // tier-navigation row used to occupy, directly above the results.
  let html = renderSelectorPillsHtml();
  html += `<div class="section-hdr all" style="margin-top:14px">${headerHtml}</div>`;
  if (subHeaderHtml) html += `<div style="font-size:11px;color:var(--text3);margin-bottom:8px">${subHeaderHtml}</div>`;

  TIER_ORDER.forEach(g => {
    const civs = byGrade[g];
    const gcolor = GRADE_COLOR[g];
    html += `<div class="section-hdr" style="color:${gcolor};border-top-color:${gcolor}44">${g} Tier — ${civs.length} civ${civs.length !== 1 ? 's' : ''}</div>`;
    if (!civs.length) {
      html += `<div style="font-size:12px;color:var(--text3);padding:4px 0 8px">No civs landed in this tier this ranking.</div>`;
    } else {
      html += `<div class="civ-grid">`;
      civs.forEach(c => {
        const isActive = activeCard === c ? ' active' : '';
        html += `<div class="civ-card ${isActive}" style="border-color:${gcolor}55" data-civ="${c}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div class="cname">${c}</div>
            <span style="font-size:11px;font-weight:800;color:${gcolor};background:${gcolor}22;border:1px solid ${gcolor};border-radius:5px;padding:0 5px;flex-shrink:0">${g}</span>
          </div>
          <div class="score-txt">${valueLabel(c)}</div>
        </div>`;
      });
      html += `</div>`;
    }
  });

  const root = document.getElementById('civ-section');
  root.innerHTML = html;
  attachSelectorPillEvents(root);
  attachCardEvents();
}

function renderArchetypeGrid() {
  const arch = CIV_ARCHETYPES[activeArchetype];
  const max = arch.items.length;
  const pool = archetypeCivList(arch);
  renderTierListShared({
    pool,
    gradeOf: c => civGrade(c, arch),
    valueOf: c => totalScoreCiv(c, arch).total,
    valueLabel: c => scoreLabel(totalScoreCiv(c, arch), max),
    headerHtml: `${arch.emoji} ${arch.label} — ranked by tech tree + civ bonuses (${max} tech items, +2 pts per qualifying bonus)`,
    subHeaderHtml: arch.restrictTo ? `Only civs with access to this archetype's core units are shown (${pool.length} of 53)` : null,
    clearLabel: `${arch.emoji} ${arch.label} ranking`,
  });
}

function renderMapOverallGrid() {
  const map = activeMapOverall;
  const grades = getMapOverallGrades(map);
  const emoji = map === 'Arabia' ? '🏜' : map === 'Arena' ? '🏛' : '🌐';
  renderTierListShared({
    pool: ALL_CIVS,
    gradeOf: c => grades[c]?.grade || null,
    valueOf: c => grades[c]?.score || 0,
    valueLabel: c => {
      const s = grades[c]?.score;
      return s != null ? `weighted score: ${s >= 0 ? '+' : ''}${s.toFixed(3)}` : '';
    },
    headerHtml: `${emoji} ${map} — tech tree ranking weighted by map win rate correlations`,
    subHeaderHtml: map === 'Combined' ? `Average of all map weights (${Object.keys(MAP_TECH_WEIGHTS).filter(k=>k!=='Combined').join(' + ')}). Higher = tech tree strengths align with winning across map types.` : `Higher = this civ's tech tree strengths align with what wins on ${map}. Based on aoestats.io Spearman r analysis.`,
    clearLabel: `${emoji} ${map} tech ranking`,
  });
}

function mapWR(civ, m) {
  const entry = MAP_WR[civ];
  return entry && entry[m.key] != null ? entry[m.key] : null;
}

function mapGrades(m) {
  const scores = {};
  ALL_CIVS.forEach(c => {
    const wr = mapWR(c, m);
    if (wr != null) scores[c] = wr;
  });
  const civsWithData = Object.keys(scores);
  const tiers = tierRangeForPoolSize(civsWithData.length);
  const scored = civsWithData.map(c => ({ c, score: scores[c] }));
  return computeGradesFromScored(scored, tiers);
}

function renderMapGrid() {
  const m = MAP_ARCHETYPES[activeMap];
  const grades = mapGrades(m);
  const civsWithData = ALL_CIVS.filter(c => mapWR(c, m) != null);
  const missingData = ALL_CIVS.filter(c => mapWR(c, m) == null);
  renderTierListShared({
    pool: ALL_CIVS,
    gradeOf: c => grades[c] || null,
    valueOf: c => mapWR(c, m) || 0,
    valueLabel: c => `${mapWR(c, m)}% win rate`,
    headerHtml: `${m.emoji} ${m.label} — real win rate data from aoestats.io (1v1 Random Map, all ratings)`,
    subHeaderHtml: missingData.length ? `${missingData.join(', ')} — insufficient games on this map for reliable data yet` : null,
    clearLabel: `${m.emoji} ${m.label} ranking`,
  });
}

/* Unified per-civ stats for a player, from whichever source that player
   uses. Two source shapes:
   - 'match': PLAYER_MATCH_DATA[key].matches is a raw per-game list
     ({civ,map,won}) — supports genuine map-filtering by aggregating only
     the games on that map.
   - 'aggregate': PLAYER_DATA[key].civs is a pre-computed {civ:{wr,games}}
     table (from a source like aoe2insights.com that doesn't expose raw
     per-match data) — map-filtering isn't possible, since there's no
     civ-on-map cross-tabulation available from that source.
   Returns { [civ]: {wr, games} }, already filtered by minGames. */
/* Resolve the raw match list for a match-sourced player under the current
   ladder selection — a specific ladder key, or 'All' to combine every
   ladder that player has data for. Each match-sourced PLAYER_LIST entry
   points at its own top-level data object (matchDataSource) so multiple
   such players don't collide on shared ladder-key names like '1v1 PC'. */
const MATCH_DATA_SOURCES = {}; // no groups are compiled anymore — everything's fetched from the player-data repo

/* Lazy-fetch + cache a remote player's full match history. Only called
   when someone actually opens that specific player's card — never
   preloaded, which is what keeps page load fast regardless of how many
   players are in the database. Genuinely async; everything downstream of
   this (render, getPlayerCivStats, etc.) stays synchronous and just reads
   whatever's already in _remotePlayerCache — see selectPlayer(). */
/* Shared category pill row for the player-stats map filter — same markup
   used in both the individual-player and group-overall map filter blocks. */
function mapCategoryPillsHtml() {
  return `<div class="arch-pill-row" data-map-category-row style="margin-top:6px">` +
    Object.entries(PLAYER_MAP_CATEGORY_LABELS).map(([key, label]) =>
      `<button type="button" data-map-cat="${key}" style="font-size:10px;padding:3px 9px;background:var(--surf);border:1px solid var(--border);border-radius:14px;color:var(--text2);cursor:pointer">${label}</button>`
    ).join('') + `</div>`;
}

async function fetchRemotePlayerData(group, profileId) {
  if (_remotePlayerCache[profileId]) return _remotePlayerCache[profileId];
  try {
    const res = await fetch(`${PLAYER_DATA_BASE}/${group}/${profileId}.json`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    _remotePlayerCache[profileId] = data;
    return data;
  } catch(e) {
    _remotePlayerCache[profileId] = { error: true, ladders: {} }; // cache the failure too, avoid refetch loops
    return _remotePlayerCache[profileId];
  }
}

function _selectLadderFromLadders(ladders, ladder) {
  if (!ladders) return [];
  if (ladder === 'All') {
    let all = [];
    Object.values(ladders).forEach(l => { all = all.concat(l?.matches || []); });
    return all;
  }
  if (ladder === 'PC' || ladder === 'Console') {
    let combined = [];
    Object.entries(ladders).forEach(([label, l]) => {
      if (label.includes(ladder)) combined = combined.concat(l?.matches || []);
    });
    return combined;
  }
  return ladders[ladder]?.matches || [];
}

/* True once this player's data is either already cached, or doesn't need
   fetching at all (compiled/pro). False means renderPlayerGrid should show
   a loading state rather than an empty/zeroed-out stat block. */
function isPlayerDataReady(playerKey) {
  const listEntry = PLAYER_LIST.find(p => p.key === playerKey);
  if (!listEntry) return true;
  if (listEntry.source !== 'remote') return true;
  return !!_remotePlayerCache[listEntry.profileId];
}

/* Synchronous everywhere — the render tree depends on this being instant.
   For compiled players reads straight from MATCH_DATA_SOURCES as before.
   For remote players reads from _remotePlayerCache: [] until that
   player's fetch (kicked off by selectPlayer) has resolved. */
function getPlayerMatches(playerKey, ladder) {
  const listEntry = PLAYER_LIST.find(p => p.key === playerKey);
  if (!listEntry) return [];
  if (listEntry.source === 'remote') {
    const cached = _remotePlayerCache[listEntry.profileId];
    return _selectLadderFromLadders(cached?.ladders, ladder);
  }
  if (listEntry.source !== 'match' || !listEntry.ladderKeys) return [];
  const dataObj = MATCH_DATA_SOURCES[listEntry.matchDataSource];
  if (!dataObj) return [];
  if (ladder === 'All') {
    let all = [];
    Object.values(listEntry.ladderKeys).forEach(k => {
      all = all.concat(dataObj[k]?.matches || []);
    });
    return all;
  }
  if (ladder === 'PC' || ladder === 'Console') {
    let combined = [];
    Object.entries(listEntry.ladderKeys).forEach(([label, k]) => {
      if (label.includes(ladder)) combined = combined.concat(dataObj[k]?.matches || []);
    });
    return combined;
  }
  const dataKey = listEntry.ladderKeys[ladder];
  return dataKey ? (dataObj[dataKey]?.matches || []) : [];
}

function getPlayerMatchMeta(playerKey, ladder) {
  const listEntry = PLAYER_LIST.find(p => p.key === playerKey);
  if (!listEntry) return null;
  if (listEntry.source === 'remote') {
    const cached = _remotePlayerCache[listEntry.profileId];
    const ladders = cached?.ladders;
    if (!ladders) return null;
    if (ladder === 'PC' || ladder === 'Console') {
      const games = _selectLadderFromLadders(ladders, ladder);
      let latestRating = null, latestDate = '';
      Object.entries(ladders).forEach(([label, l]) => {
        if (!label.includes(ladder)) return;
        const subMatches = l?.matches || [];
        const lastMatch = subMatches[0];
        if (l?.meta?.latestRating != null && (!latestDate || (lastMatch?.date || '') > latestDate)) {
          latestRating = l.meta.latestRating;
          latestDate = lastMatch?.date || '';
        }
      });
      return { source:'data.aoe2companion.com (raw match API)', mode:`${ladder} — 1v1 + Team combined`, totalGames: games.length, latestRating };
    }
    return ladders[ladder]?.meta || null;
  }
  const dataObj = MATCH_DATA_SOURCES[listEntry.matchDataSource];
  if (!dataObj) return null;
  if (ladder === 'PC' || ladder === 'Console') {
    const games = getPlayerMatches(playerKey, ladder);
    let latestRating = null, latestDate = '';
    Object.entries(listEntry.ladderKeys).forEach(([label, k]) => {
      if (!label.includes(ladder)) return;
      const m = dataObj[k]?.meta;
      const subMatches = dataObj[k]?.matches || [];
      const lastMatch = subMatches[0];
      if (m?.latestRating != null && (!latestDate || (lastMatch?.date || '') > latestDate)) {
        latestRating = m.latestRating;
        latestDate = lastMatch?.date || '';
      }
    });
    return { source:'data.aoe2companion.com (raw match API)', mode:`${ladder} — 1v1 + Team combined`, totalGames: games.length, latestRating };
  }
  const dataKey = listEntry.ladderKeys[ladder];
  return dataKey ? dataObj[dataKey]?.meta : null;
}

/* Synchronous alias kept for the one internal caller (pro-group pooling in
   getGroupOverallCivStats) that predates the remote-player split — pro is
   always 'match'-sourced so this is just getPlayerMatches under a name
   that makes that assumption explicit at the call site. */
function getPlayerMatchesSync(playerKey, ladder) { return getPlayerMatches(playerKey, ladder); }

/* Recent Form: exponential-decay weighting so recent games count more than
   old ones, instead of a flat lifetime average. weight halves every
   RECENT_FORM_HALF_LIFE_DAYS — a game from today counts fully, a game from
   90 days ago counts half, 180 days ago a quarter, and so on. Old games
   never vanish entirely, they just fade out gradually. */
const RECENT_FORM_HALF_LIFE_DAYS = 90;

function recentFormWeight(dateStr) {
  const gameDate = new Date(dateStr + 'T00:00:00Z');
  const daysAgo = (Date.now() - gameDate.getTime()) / 86400000;
  return Math.pow(0.5, Math.max(0, daysAgo) / RECENT_FORM_HALF_LIFE_DAYS);
}

/* Shared aggregation core: turns a flat list of match records into
   per-civ {wr, games}, respecting whatever Recent Form weighting is
   currently active. Used both for a single player's own stats and for
   Console Overall's pooled stats — same math either way, just a
   different-sized bag of matches going in. */
function aggregateMatchesToStats(matches, minGames) {
  const useForm = activeRecencyMode === 'form';
  const agg = {};
  matches.forEach(m => {
    if (m.won == null) return; // unresolved/in-progress match — don't count as a loss
    if (!agg[m.civ]) agg[m.civ] = { wins: 0, games: 0, weightedWins: 0, weightedGames: 0 };
    agg[m.civ].games++;
    if (m.won) agg[m.civ].wins++;
    if (useForm && m.date) {
      const w = recentFormWeight(m.date);
      agg[m.civ].weightedGames += w;
      if (m.won) agg[m.civ].weightedWins += w;
    }
  });
  const out = {};
  Object.entries(agg).forEach(([civ, e]) => {
    if (e.games < minGames) return;
    const wr = useForm && e.weightedGames > 0
      ? Math.round(e.weightedWins / e.weightedGames * 1000) / 10
      : Math.round(e.wins / e.games * 1000) / 10;
    out[civ] = { wr, games: e.games };
  });
  return out;
}

/* Applies the Map / Current-Patch filters to a player's raw match list,
   consistently, wherever that list is headed next (one player's own
   stats, or pooled into Console Overall). */
function filterMatches(matches, mapFilter) {
  let out = mapFilter ? matches.filter(m => m.map === mapFilter) : matches;
  if (activeRecencyMode === 'patch') {
    const patches = out.map(m => m.patch).filter(p => p != null);
    if (patches.length) {
      const maxPatch = Math.max(...patches);
      out = out.filter(m => m.patch === maxPatch);
    }
  }
  return out;
}

function getPlayerCivStats(playerKey, ladder, mapFilter, minGames) {
  const listEntry = PLAYER_LIST.find(p => p.key === playerKey);
  if (!listEntry) return {};

  if (listEntry.source === 'match' || listEntry.source === 'remote') {
    const matches = filterMatches(getPlayerMatches(playerKey, ladder), mapFilter);
    return aggregateMatchesToStats(matches, minGames);
  }

  // aggregate source — ladder selection, map-filtering, current-patch, and
  // recent-form are all unsupported (no raw per-match data to compute from)
  const civs = PLAYER_DATA[playerKey]?.civs || {};
  const out = {};
  Object.entries(civs).forEach(([civ, e]) => {
    if (e.games >= minGames) out[civ] = e;
  });
  return out;
}

/* Every map a player has data for, from whichever source — used to build
   the "select a map to filter" pills and the top-played-maps readout. */
function getPlayerMapList(playerKey, ladder) {
  const listEntry = PLAYER_LIST.find(p => p.key === playerKey);
  if (!listEntry) return [];
  if (listEntry.source === 'match' || listEntry.source === 'remote') {
    const matches = getPlayerMatches(playerKey, ladder);
    const agg = {};
    matches.forEach(m => {
      if (m.won == null) return; // unresolved/in-progress match
      if (!agg[m.map]) agg[m.map] = { wins: 0, games: 0 };
      agg[m.map].games++;
      if (m.won) agg[m.map].wins++;
    });
    return Object.entries(agg).map(([map, { wins, games }]) => ({ map, wr: Math.round(wins/games*1000)/10, games }));
  }
  const maps = PLAYER_DATA[playerKey]?.maps || {};
  return Object.entries(maps).map(([map, e]) => ({ map, wr: e.wr, games: e.games }));
}

/* Player win-rate grading always uses the full S-F range regardless of pool
   size, unlike civ archetype grading (which scales tier count down for
   small pools like Camel/Elephant). Player data has much higher tie rates
   — small sample sizes mean lots of civs land on exact percentages like
   0%/50%/100% — and capping at 5 tiers for anything ≤46 civs meant a
   civ with a genuine 0% win rate had no lower floor than "D", the same
   bucket as civs with real (non-zero) wins. */
function tierRangeForPlayerGrading() {
  return ['S','A','B','C','D','F'];
}

function playerGrades(playerKey, ladder, mapFilter, minGames) {
  const stats = getPlayerCivStats(playerKey, ladder, mapFilter, minGames);
  const civsWithData = Object.keys(stats);
  const tiers = tierRangeForPlayerGrading();
  const scored = civsWithData.map(c => ({ c, score: stats[c].wr }));
  return computeGradesFromScored(scored, tiers);
}

/* Most-recent pulledDate across this player's ladders — reads whichever
   underlying data source actually applies (compiled MATCH_DATA_SOURCES
   for pro, cached remote JSON for console/pc/streamer), so the "Snapshot
   from... pulled X" line always reflects the real data instead of a
   hardcoded placeholder. */
function getPlayerPulledDate(playerKey) {
  const listEntry = PLAYER_LIST.find(p => p.key === playerKey);
  if (!listEntry) return null;
  let metas = [];
  if (listEntry.source === 'remote') {
    const cached = _remotePlayerCache[listEntry.profileId];
    metas = Object.values(cached?.ladders || {}).map(l => l?.meta);
  } else if (listEntry.source === 'match' && listEntry.ladderKeys) {
    const dataObj = MATCH_DATA_SOURCES[listEntry.matchDataSource];
    metas = Object.values(listEntry.ladderKeys).map(k => dataObj?.[k]?.meta);
  }
  const dates = metas.map(m => m?.pulledDate).filter(Boolean);
  if (!dates.length) return null;
  return dates.reduce((max, d) => (d > max ? d : max), dates[0]);
}

function renderPlayerGrid() {
  const p = PLAYER_LIST[activePlayer];
  if (p.source === 'remote' && !isPlayerDataReady(p.key)) {
    renderTierListShared({
      pool: [],
      gradeOf: () => null,
      valueOf: () => 0,
      valueLabel: () => '',
      headerHtml: `${p.emoji} ${p.label} — loading match history…`,
      subHeaderHtml: `Fetching this player's data from the community pipeline. This only happens once per session — it'll be instant next time.`,
      clearLabel: `${p.emoji} ${p.label} tier list`,
    });
    return;
  }
  const isMatchSource = p.source === 'match' || p.source === 'remote';
  const meta = isMatchSource
    ? (activeLadder === 'All'
        ? { source:'data.aoe2companion.com (raw match API)', pulledDate: getPlayerPulledDate(p.key), mode:'All ladders combined', totalGames: getPlayerMatches(p.key, 'All').length }
        : getPlayerMatchMeta(p.key, activeLadder))
    : PLAYER_DATA[p.key].meta;
  const stats = getPlayerCivStats(p.key, activeLadder, activePlayerMapFilter, activeMinGames);
  const grades = playerGrades(p.key, activeLadder, activePlayerMapFilter, activeMinGames);

  // Map pills: select one to filter this player's civ list to that map
  // specifically (only possible for raw-match-sourced players/ladders).
  // Clicking the active one again clears the filter. Collapsed by default
  // behind a <details> — with hundreds of games, the map list can run to
  // 40-50+ pills and dominate the screen otherwise.
  const mapList = getPlayerMapList(p.key, activeLadder).sort((a,b) => b.games - a.games);
  let mapPillsHtml = '';
  const activeFilterHint = activePlayerMapFilter ? ` — filtering to <b style="color:var(--amberL)">${activePlayerMapFilter}</b>` : '';
  if (isMatchSource && mapList.length) {
    const inner = mapList.map(m => {
        const on = activePlayerMapFilter === m.map ? ' on' : '';
        return `<button class="arch-btn${on}" data-kind="playermap" data-map="${m.map}" data-name="${m.map.toLowerCase()}" style="font-size:11px">${m.map} <span style="opacity:.65">(${m.games}g)</span></button>`;
      }).join('');
    mapPillsHtml = `<details data-map-filter style="margin-top:8px"${mapFilterDetailsOpen ? ' open' : ''}>
      <summary style="cursor:pointer;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Filter to a map (${mapList.length})${activeFilterHint}</summary>
      <input type="text" id="map-filter-search" placeholder="Search maps…" style="height:26px;padding:0 8px;background:var(--surf);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:11px;outline:none;width:140px;margin-top:6px;display:block">
      ${mapCategoryPillsHtml()}
      <div class="arch-pill-row" data-map-pill-row style="margin-top:4px">${inner}</div>
    </details>`;
  } else if (!isMatchSource) {
    const mapEntries = mapList.filter(m => m.games >= 3).slice(0, 8);
    const mapHtml = mapEntries.map(m =>
      `<span style="display:inline-flex;gap:4px;align-items:baseline;font-size:11px;padding:3px 9px;background:var(--surf);border:1px solid var(--border);border-radius:20px;margin:2px">
        <b style="color:var(--amberL)">${m.map}</b> ${m.wr}% <span style="color:var(--text3)">(${m.games}g)</span>
      </span>`
    ).join('');
    mapPillsHtml = `<details style="margin-top:8px">
      <summary style="cursor:pointer;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Top-played maps — click-to-filter unavailable (this player's source has no raw per-match data)</summary>
      <div style="margin-top:4px">${mapHtml || '<span style="color:var(--text3);font-size:11px">No map data on record.</span>'}</div>
    </details>`;
  }

  const missingData = ALL_CIVS.filter(c => !stats[c]);
  const filterNote = activePlayerMapFilter ? ` · filtered to <b style="color:var(--amberL)">${activePlayerMapFilter}</b> only` : '';
  const ladderNote = isMatchSource ? ` · ${activeLadder}` : '';

  // Games-played callout — always derived from meta.totalGames, never a
  // hardcoded figure, so it can't drift out of sync with the civ table.
  let gamesLabel;
  if (isMatchSource) {
    // Always the REAL currently-filtered count (map + current-patch both
    // applied) — never the stored/unfiltered meta.totalGames, which would
    // silently drift out of sync with the civ table the moment a filter
    // narrows things down (e.g. "current patch only" showing the full
    // all-time game count instead of just that patch's games).
    const filteredCount = filterMatches(getPlayerMatches(p.key, activeLadder), activePlayerMapFilter).length;
    const kind =
      activeLadder === 'All' ? 'matches across all ladders' :
      activeLadder === 'Console' ? 'ranked console games (1v1 + Team)' :
      activeLadder === 'PC' ? 'ranked PC games (1v1 + Team)' :
      activeLadder.includes('Team') ? 'ranked team matches' :
      'ranked 1v1 matches';
    gamesLabel = `${filteredCount.toLocaleString()} ${kind}`;
  } else {
    gamesLabel = `${meta.totalGames.toLocaleString()} ranked 1v1 matches`;
  }

  const currentPatchNote = (isMatchSource && activeRecencyMode === 'patch') ? ` · <b style="color:var(--amberL)">current patch only</b>` : '';
  const recentFormNote = (isMatchSource && activeRecencyMode === 'form') ? ` · <b style="color:var(--amberL)">More recent games weighted more heavily than older ones</b>` : '';

  renderTierListShared({
    pool: ALL_CIVS,
    gradeOf: c => grades[c] || null,
    valueOf: c => stats[c]?.wr || 0,
    valueLabel: c => `${stats[c].wr}% win rate (${stats[c].games} game${stats[c].games !== 1 ? 's' : ''})`,
    headerHtml: `${p.emoji} ${p.label} — real personal civ win rates${ladderNote}${filterNote}${currentPatchNote}${recentFormNote}`,
    subHeaderHtml: `<b style="color:var(--amberL)">${gamesLabel}</b> · Snapshot from ${meta.source}, pulled ${meta.pulledDate || 'recently'} — not live. Showing civs with ${activeMinGames > 0 ? activeMinGames + '+' : 'any number of'} games.${activeRecencyMode === 'form' ? ' Win rates below are recency-weighted, not flat averages.' : ''}${missingData.length ? ` No qualifying data for: ${missingData.slice(0,15).join(', ')}${missingData.length>15?'…':''}.` : ''}${mapPillsHtml}`,
    clearLabel: `${p.emoji} ${p.label} tier list`,
  });
}

/* Group Overall: pools every player in a group's ('pro' or 'console') own
   raw matches together (respecting whatever Ladder/Map/Current-Patch
   filter is active) and computes one genuine win rate from the combined
   total — total wins across everyone divided by total games across
   everyone. This is weighted by games played, not a flat per-player
   average: a player with 500 games on a civ naturally has proportionally
   more influence on that civ's combined number than a player with 5, the
   same way it would if all those games had simply been played by one
   person. Contributor count is still tracked and shown, just doesn't
   affect the math anymore. */
const CONSOLE_ELO_BRACKETS = {
  high:  { label:'High',    min:1700, max:Infinity },
  himid: { label:'Hi-Mid',  min:1300, max:1699 },
  lomid: { label:'Lo-Mid',  min:900,  max:1299 },
  low:   { label:'Low',     min:0,    max:899  },
};
/* PC ratings typically run higher than console — these thresholds are a
   starting estimate, worth recalibrating once real PC player rating
   distribution is visible in the aggregate. */
const PC_ELO_BRACKETS = {
  high:  { label:'High',    min:2000, max:Infinity },
  himid: { label:'Hi-Mid',  min:1600, max:1999 },
  lomid: { label:'Lo-Mid',  min:1200, max:1599 },
  low:   { label:'Low',     min:0,    max:1199 },
};

function playerConsoleRating(p) {
  // Remote players (console/pc/streamer) carry their ratings straight from
  // aggregate.json — no per-player fetch needed just to bucket by ELO.
  if (p.source === 'remote') return p.ratings?.['1v1 Console'] ?? null;
  const ds = MATCH_DATA_SOURCES[p.matchDataSource];
  return ds?.['1v1 Console']?.meta?.latestRating ?? null;
}

/* Rating shown on the roster pill — console players show their console
   rating, everyone else (pro/pc/streamer, all PC-primary) shows PC rating
   instead so the badge is actually meaningful for that group. */
function playerDisplayRating(p) {
  if (p.group === 'console') return playerConsoleRating(p);
  if (p.source === 'remote') return p.ratings?.['1v1 PC'] ?? p.ratings?.['1v1 Console'] ?? null;
  const ds = MATCH_DATA_SOURCES[p.matchDataSource];
  return ds?.['1v1 PC']?.meta?.latestRating ?? ds?.['1v1 Console']?.meta?.latestRating ?? null;
}

/* Converts one of aggregate.json's pre-pooled {civ:{games,wins,pickRate}}
   slices into the {civ:{wr,games,contributors}} shape the rest of the tier
   list / grading code already expects. contributors isn't tracked in the
   aggregate (it's a pooled stat, not per-player), so it's omitted (null)
   for remote groups — same visual treatment as "no data" elsewhere. */
function aggregateSliceToStats(slice, minGames) {
  const out = {};
  Object.entries(slice || {}).forEach(([civ, e]) => {
    if (e.games < minGames) return;
    out[civ] = { wr: e.games ? Math.round(e.wins / e.games * 1000) / 10 : 0, games: e.games, contributors: null };
  });
  return out;
}

/* Same Recent Form decay curve individual players already use (90-day
   half-life via recentFormWeight), just replayed against weekly totals
   instead of per-match dates — aggregate.json buckets by week (Monday
   start) rather than storing every match's date, which would defeat the
   whole point of a small, fast-loading pooled aggregate. Slightly coarser
   than per-match weighting but the same shape of curve: recent weeks count
   more, older ones fade out smoothly rather than a hard cutoff. */
function aggregateByWeekToStats(byWeek, minGames) {
  const totals = {}; // civ -> { games, wins, weightedGames, weightedWins }
  Object.entries(byWeek || {}).forEach(([weekStart, civs]) => {
    const w = recentFormWeight(weekStart);
    Object.entries(civs).forEach(([civ, e]) => {
      if (!totals[civ]) totals[civ] = { games: 0, wins: 0, weightedGames: 0, weightedWins: 0 };
      totals[civ].games += e.games;
      totals[civ].wins += e.wins;
      totals[civ].weightedGames += e.games * w;
      totals[civ].weightedWins += e.wins * w;
    });
  });
  const out = {};
  Object.entries(totals).forEach(([civ, t]) => {
    if (t.games < minGames) return;
    const wr = t.weightedGames > 0
      ? Math.round(t.weightedWins / t.weightedGames * 1000) / 10
      : 0;
    out[civ] = { wr, games: t.games, contributors: null };
  });
  return out;
}

/* byLadder only has the 4 raw keys (1v1 Console, Team Console, 1v1 PC,
   Team PC) — the combined "Console" / "PC" ladder pills need those merged
   client-side. Summing games/wins per civ across whichever raw ladders
   belong to that combined pill, then recomputing pickRate from the total. */
function combineLadderSlices(byLadder, ladderKeys) {
  const combined = {};
  ladderKeys.forEach(key => {
    const slice = byLadder?.[key];
    if (!slice) return;
    Object.entries(slice).forEach(([civ, e]) => {
      if (!combined[civ]) combined[civ] = { games: 0, wins: 0 };
      combined[civ].games += e.games;
      combined[civ].wins += e.wins;
    });
  });
  const totalGames = Object.values(combined).reduce((s, e) => s + e.games, 0);
  Object.values(combined).forEach(e => { e.pickRate = totalGames ? e.games / totalGames : 0; });
  return combined;
}
const COMBINED_LADDER_KEYS = {
  Console: ['1v1 Console', 'Team Console'],
  PC: ['1v1 PC', 'Team PC'],
};

function getGroupOverallCivStats(group, mapFilter, minGames) {
  const src = GROUP_SOURCES[group];

  if (src && src.mode === 'remote') {
    if (!AGGREGATE || !AGGREGATE[group]) return {};
    const g = AGGREGATE[group];
    // Precedence when multiple filters are active at once (the aggregate
    // only stores each dimension pre-pooled separately, not combined):
    // map filter > recent-form / current-patch > ELO bracket > ladder > default.
    if (mapFilter && g.byMap?.[mapFilter]) return aggregateSliceToStats(g.byMap[mapFilter], minGames);
    if (activeRecencyMode === 'form' && g.byWeek) return aggregateByWeekToStats(g.byWeek, minGames);
    let slice;
    if (activeRecencyMode === 'patch' && AGGREGATE.currentPatch && g.byPatch?.[AGGREGATE.currentPatch]) slice = g.byPatch[AGGREGATE.currentPatch];
    else if (group === 'console' && activeConsoleElo && g.byEloBracket?.[activeConsoleElo]) slice = g.byEloBracket[activeConsoleElo];
    else if (group === 'pc' && activePcElo && g.byEloBracket?.[activePcElo]) slice = g.byEloBracket[activePcElo];
    else if (activeLadder === 'Console' || activeLadder === 'PC') slice = combineLadderSlices(g.byLadder, COMBINED_LADDER_KEYS[activeLadder]);
    else if (activeLadder && activeLadder !== 'All' && g.byLadder?.[activeLadder]) slice = g.byLadder[activeLadder];
    else slice = g.civWinRates; // 'All' (and true default) — genuinely the full pooled total, this one was already correct
    return aggregateSliceToStats(slice, minGames);
  }

  // Compiled groups (pro) — unchanged from before: loop each player's
  // in-memory match data and pool it manually.
  let players = PLAYER_LIST.filter(p => p.group === group);
  let pooledMatches = [];
  const contributorsByCiv = {};
  players.forEach(p => {
    const matches = filterMatches(getPlayerMatchesSync(p.key, activeLadder), mapFilter);
    pooledMatches = pooledMatches.concat(matches);
    const civsPlayed = new Set(matches.map(m => m.civ));
    civsPlayed.forEach(civ => {
      if (!contributorsByCiv[civ]) contributorsByCiv[civ] = 0;
      contributorsByCiv[civ]++;
    });
  });
  const stats = aggregateMatchesToStats(pooledMatches, minGames);
  const out = {};
  Object.entries(stats).forEach(([civ, e]) => {
    out[civ] = { wr: e.wr, games: e.games, contributors: contributorsByCiv[civ] || 0 };
  });
  return out;
}

/* Union of every player-in-group's own map list, games summed across all
   of them — powers the same "filter to a map" pill row the per-player
   view uses, but scoped to the whole group rather than one person. */
function getGroupOverallMapList(group) {
  const src = GROUP_SOURCES[group];
  if (src && src.mode === 'remote') {
    if (!AGGREGATE || !AGGREGATE[group]?.byMap) return [];
    return Object.entries(AGGREGATE[group].byMap).map(([map, civs]) => ({
      map,
      games: Object.values(civs).reduce((sum, c) => sum + c.games, 0),
    }));
  }
  const players = PLAYER_LIST.filter(p => p.group === group);
  const perMap = {};
  players.forEach(p => {
    getPlayerMapList(p.key, activeLadder).forEach(m => {
      if (!perMap[m.map]) perMap[m.map] = 0;
      perMap[m.map] += m.games;
    });
  });
  return Object.entries(perMap).map(([map, games]) => ({ map, games }));
}

function groupOverallGrades(group, mapFilter, minGames) {
  const stats = getGroupOverallCivStats(group, mapFilter, minGames);
  const civsWithData = Object.keys(stats);
  const tiers = tierRangeForPlayerGrading();
  const scored = civsWithData.map(c => ({ c, score: stats[c].wr }));
  return computeGradesFromScored(scored, tiers);
}

const GROUP_OVERALL_META = {
  pro: { emoji: '🏆', label: 'Pro Overall', groupLabel: 'Pro Players' },
  console: { emoji: '🎮', label: 'Console Overall', groupLabel: 'Console Players' },
  pc: { emoji: '🖥️', label: 'PC Overall', groupLabel: 'PC Players' },
};

function renderGroupOverallGrid() {
  const group = activeGroupOverall;
  const meta = GROUP_OVERALL_META[group];
  const stats = getGroupOverallCivStats(group, activePlayerMapFilter, activeMinGames);
  const grades = groupOverallGrades(group, activePlayerMapFilter, activeMinGames);

  // If an ELO bracket is active for console/PC, count only players in that bracket
  let groupPlayers = PLAYER_LIST.filter(p => p.group === group);
  if (group === 'console' && activeConsoleElo) {
    const bracket = CONSOLE_ELO_BRACKETS[activeConsoleElo];
    if (bracket) groupPlayers = groupPlayers.filter(p => {
      const r = playerConsoleRating(p);
      return r !== null && r >= bracket.min && r <= bracket.max;
    });
  } else if (group === 'pc' && activePcElo) {
    const bracket = PC_ELO_BRACKETS[activePcElo];
    if (bracket) groupPlayers = groupPlayers.filter(p => {
      const r = playerDisplayRating(p);
      return r !== null && r >= bracket.min && r <= bracket.max;
    });
  }
  const playerCount = groupPlayers.length;

  // Build ELO note for header/subheader
  const eloNote = (group === 'console' && activeConsoleElo) ? (() => {
    const b = CONSOLE_ELO_BRACKETS[activeConsoleElo];
    const range = b.max === Infinity ? `${b.min}+` : `${b.min}–${b.max}`;
    return ` · <b style="color:var(--amberL)">${b.label} ELO (${range})</b>`;
  })() : (group === 'pc' && activePcElo) ? (() => {
    const b = PC_ELO_BRACKETS[activePcElo];
    const range = b.max === Infinity ? `${b.min}+` : `${b.min}–${b.max}`;
    return ` · <b style="color:var(--amberL)">${b.label} ELO (${range})</b>`;
  })() : '';

  const mapList = getGroupOverallMapList(group).sort((a, b) => b.games - a.games);
  const activeFilterHint = activePlayerMapFilter ? ` — filtering to <b style="color:var(--amberL)">${activePlayerMapFilter}</b>` : '';
  const inner = mapList.map(m => {
    const on = activePlayerMapFilter === m.map ? ' on' : '';
    return `<button class="arch-btn${on}" data-kind="playermap" data-map="${m.map}" data-name="${m.map.toLowerCase()}" style="font-size:11px">${m.map} <span style="opacity:.65">(${m.games}g)</span></button>`;
  }).join('');
  const mapPillsHtml = mapList.length ? `<details data-map-filter style="margin-top:8px"${mapFilterDetailsOpen ? ' open' : ''}>
    <summary style="cursor:pointer;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Filter to a map (${mapList.length})${activeFilterHint}</summary>
    <input type="text" id="map-filter-search" placeholder="Search maps…" style="height:26px;padding:0 8px;background:var(--surf);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:11px;outline:none;width:140px;margin-top:6px;display:block">
    ${mapCategoryPillsHtml()}
    <div class="arch-pill-row" data-map-pill-row style="margin-top:4px">${inner}</div>
  </details>` : '';

  const missingData = ALL_CIVS.filter(c => !stats[c]);
  const filterNote = activePlayerMapFilter ? ` · filtered to <b style="color:var(--amberL)">${activePlayerMapFilter}</b> only` : '';
  const currentPatchNote = activeRecencyMode === 'patch' ? ` · <b style="color:var(--amberL)">current patch only${AGGREGATE?.currentPatch ? ` (${AGGREGATE.currentPatch})` : ''}</b>` : '';
  const recentFormNote = activeRecencyMode === 'form' ? ` · <b style="color:var(--amberL)">More recent games weighted more heavily than older ones</b>` : '';

  renderTierListShared({
    pool: ALL_CIVS,
    gradeOf: c => grades[c] || null,
    valueOf: c => stats[c]?.wr || 0,
    valueLabel: c => {
      const s = stats[c];
      const contribClause = s.contributors != null
        ? `, ${s.contributors} player${s.contributors !== 1 ? 's' : ''}`
        : '';
      return `${s.wr}% win rate (${s.games} games total${contribClause})`;
    },
    headerHtml: `${meta.emoji} ${meta.label} — pooled across ${playerCount} ${meta.groupLabel}${eloNote} · ${activeLadder}${filterNote}${currentPatchNote}${recentFormNote}`,
    subHeaderHtml: `Averaged across ${
      activeConsoleElo ? `${playerCount} ${CONSOLE_ELO_BRACKETS[activeConsoleElo].label}-ELO Console`
      : activePcElo ? `${playerCount} ${PC_ELO_BRACKETS[activePcElo].label}-ELO PC`
      : `${playerCount} ${meta.groupLabel}`
    } players, weighted by games played. Showing civs with ${activeMinGames > 0 ? activeMinGames + '+' : 'any number of'} games.${missingData.length ? ` No data for: ${missingData.slice(0,15).join(', ')}${missingData.length>15?'…':''}.` : ''}${mapPillsHtml}`,
    clearLabel: `${meta.emoji} ${meta.label} tier list`,
  });
}

function renderOverallTierGrid() {
  const grades = getOverallGrades();
  renderTierListShared({
    pool: ALL_CIVS,
    gradeOf: c => grades[c]?.grade,
    valueOf: c => grades[c]?.avg || 0,
    valueLabel: c => `${(grades[c]?.avg || 0).toFixed(2)} avg archetype grade value`,
    headerHtml: `🏅 Tier List Overall — ranked by aggregate grade across every archetype`,
    subHeaderHtml: null,
    clearLabel: `Tier List Overall`,
  });
}

function renderStatus() {

  if (!selected.length) { el.textContent = ''; return; }

function renderChips() {
  const el = document.getElementById('filter-chips');
  if (!selected.length) { el.innerHTML = ''; return; }
  let html = selected.map((item, i) =>
    `<div class="filter-chip" data-i="${i}" title="Click to remove">
       <span class="chip-dot ${item.itemType}"></span>
       <span>${item.name}</span>

function renderGrid() {
  if (activeMapOverall !== null) { renderMapOverallGrid(); return; }
  if (activeArchetype !== null) { renderArchetypeGrid(); return; }
  if (activeMap !== null) { renderMapGrid(); return; }
  if (activePlayer !== null) { renderPlayerGrid(); return; }
  if (activeGroupOverall) { renderGroupOverallGrid(); return; }
  if (activeOverallTier) { renderOverallTierGrid(); return; }

  const has = [], missing = [], unknown = [];
  ALL_CIVS.forEach(c => {
    const s = civStatus(c);
    if (s === 'has') has.push(c);
    else if (s === 'missing') missing.push(c);
    else if (s === 'unknown') unknown.push(c);
  });
  missing.sort((a, b) => civMatchCount(b) - civMatchCount(a) || a.localeCompare(b));

  const lbl = selected.length === 1 ? selected[0].name : `all ${selected.length} items`;
  let html = renderSelectorPillsHtml();
  html += `<div style="margin-top:14px"></div>`;
  if (!selected.length) {
    html += `<div class="section-hdr all">All 53 civilizations — click any civ to see its full tech tree by category</div>`;
    html += `<div class="civ-grid">${ALL_CIVS.map(c => cardHtml(c, 'neutral')).join('')}</div>`;
  } else {
    if (has.length) {
      html += `<div class="section-hdr has">✓ Has ${lbl} — ${has.length} civs</div>`;
      html += `<div class="civ-grid">${has.map(c => cardHtml(c, 'has')).join('')}</div>`;
    }
    if (missing.length) {
      html += `<div class="section-hdr missing">✗ Missing — ${missing.length} civs</div>`;
      html += `<div class="civ-grid">${missing.map(c => cardHtml(c, 'missing')).join('')}</div>`;
    }
    if (unknown.length) {
      html += `<div class="section-hdr unknown">? Data unavailable — ${unknown.length} civs</div>`;
      html += `<div class="civ-grid">${unknown.map(c => cardHtml(c, 'unknown')).join('')}</div>`;
    }
  }
  const root = document.getElementById('civ-section');
  root.innerHTML = html;

  attachCardEvents();

function cardHtml(civ, status) {
  const cd = civData[civ];
  const isActive = activeCard === civ ? ' active' : '';
  const tags = selected.map(item => {
    if (!cd) return `<span class="ctag missing">${item.name}</span>`;
    const h = hasIds(cd, item.ids || [item.id], item.itemType);
    return `<span class="ctag ${h ? 'has' : 'missing'}">${item.name}</span>`;
  }).join('');
  return `<div class="civ-card ${status}${isActive}" data-civ="${civ}">
    <div class="cname">${civ}</div>

function attachCardEvents() {
  document.querySelectorAll('.civ-card').forEach(card => {
    const civ = card.dataset.civ;
    card.addEventListener('click', () => {
      activeCard = civ;
      document.querySelectorAll('.civ-card').forEach(c => c.classList.remove('active'));

    });
    card.addEventListener('mouseenter', e => { if (!isMobile) showCivTooltip(civ, e); });
    card.addEventListener('mousemove', moveTooltip);
    card.addEventListener('mouseleave', hideTooltip);
  });
}
/* ================================================================
   VISUAL HELPERS: radial progress ring + radar/fingerprint chart
   ================================================================ */
function radialRing(pct, color, size) {
  size = size || 46;
  const r = size / 2 - 4;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - pct);
  const cx = size / 2, cy = size / 2;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="4"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"/>
  </svg>`;
}

/* Radar axes: all 12 archetypes, including Camel/Elephant/Gunpowder. Civs
   without access to a restricted archetype (Camel, Elephant) collapse that
   axis to the dead center of the disc — a visually honest "not
   applicable," distinct from actually being bad at something they can do. */
const RADAR_AXES = ['Archer','Cavalry Archer','Cavalry','Camel','Elephant','Siege','Naval','Monk','Eco','Defensive','Gunpowder','Infantry'];

function radarChartSVG(civName) {
  // Canvas sized with genuine internal padding (not just overflow:visible)
  // so long labels like "Cavalry Archer" are guaranteed to sit inside the
  // declared viewBox regardless of container width — overflow:visible alone
  // only works if the ANCESTOR container also has spare room, which mobile
  // panels don't. max-width:100%/height:auto below then lets it scale down
  // responsively without any content ever needing to escape the box.
  const size = 640, cx = size/2, cy = size/2, maxR = 118;
  const axes = RADAR_AXES.map(label => CIV_ARCHETYPES.find(a => a.label === label)).filter(Boolean);
  const n = axes.length;

  // Grade-based radius: reuses the exact same 6 fractions as the background
  // tier rings, so an F-graded axis lands almost exactly on the F ring
  // (just outside the center hole) and an S-graded axis lands on the S
  // ring at the outer edge. A civ with no access at all to a restricted
  // archetype (Camel/Elephant) gets fraction 0 — the true dead center.
  const gradeFraction = { S:1, A:0.833, B:0.667, C:0.5, D:0.333, F:0.167 };
  const grades = axes.map(arch => civGrade(civName, arch));
  const values = grades.map(g => g ? gradeFraction[g] : 0);

  const pts = values.map((v, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const rad = v === 0 ? 0 : 24 + v * maxR;
    return [cx + rad * Math.cos(angle), cy + rad * Math.sin(angle)];
  });
  const polyPoints = pts.map(p => p.join(',')).join(' ');

  // Grid rings at 6 evenly-spaced radii, filled with a very muted version of
  // each tier's color (same S-F palette used everywhere else in the app,
  // just toned way down to sit quietly behind the data line rather
  // than compete with it). Drawn largest-first (S) so each smaller ring
  // painted on top naturally forms concentric bands.
  const TIER_RING_COLORS = ['rgba(255,51,85,0.24)','rgba(255,149,0,0.22)','rgba(255,229,0,0.20)','rgba(57,255,106,0.20)','rgba(0,212,255,0.20)','rgba(176,38,255,0.18)'];
  const ringFractions = [1, 0.833, 0.667, 0.5, 0.333, 0.167];
  const ringLabels = ['S','A','B','C','D','F'];
  let gridRings = '';
  ringFractions.forEach((f, ri) => {
    const ringPts = axes.map((_, i) => {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const rad = 24 + f * maxR;
      return [cx + rad * Math.cos(angle), cy + rad * Math.sin(angle)].join(',');
    }).join(' ');
    gridRings += `<polygon points="${ringPts}" fill="${TIER_RING_COLORS[ri]}" stroke="var(--border)" stroke-width="1"/>`;
    // Label placed just above the top axis point of this ring
    const labelY = cy - (24 + f * maxR) - 3;
    gridRings += `<text x="${cx}" y="${labelY}" font-size="9" font-weight="700" fill="var(--text3)" text-anchor="middle">${ringLabels[ri]}</text>`;
  });

  // Axis lines + two-line labels (emoji on top, archetype name below)
  let axisLines = '', labels = '';
  axes.forEach((arch, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x2 = cx + (24 + maxR) * Math.cos(angle), y2 = cy + (24 + maxR) * Math.sin(angle);
    axisLines += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="var(--border)" stroke-width="1"/>`;
    const cosA = Math.cos(angle), sinA = Math.sin(angle);
    const lx = cx + (24 + maxR + 40) * cosA, ly = cy + (24 + maxR + 40) * sinA;
    const anchor = Math.abs(cosA) < 0.25 ? 'middle' : (cosA > 0 ? 'start' : 'end');
    labels += `<text x="${lx}" y="${ly - 6}" font-size="16" text-anchor="${anchor}">${arch.emoji}</text>`;
    labels += `<text x="${lx}" y="${ly + 10}" font-size="11" font-weight="600" fill="var(--text2)" text-anchor="${anchor}">${arch.label}</text>`;
  });

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="overflow:visible;max-width:100%;height:auto;display:block">
    ${gridRings}${axisLines}
    <polygon points="${polyPoints}" fill="rgba(120,80,10,.55)" stroke="var(--amber)" stroke-width="2"/>
    ${pts.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="var(--amberL)"/>`).join('')}
    ${labels}
  </svg>`;
}


/* Classifies bonus/tech text into one or more archetype categories.
   Returns an array of archetype LABELS (matching CIV_ARCHETYPES[].label)
   so a single bonus can count toward more than one category when it
   genuinely applies to both (e.g. a Camel Archer bonus is both Camel and
   Cavalry Archer relevant). Order of checks matters: more specific
   categories (Camel, Elephant, Cavalry Archer, Gunpowder) are checked
   before the broader Cavalry/Archer buckets so they don't get swallowed. */
function classifyBonusCategories(text) {
  const t = text.toLowerCase();
  const cats = new Set();

  // Strip age-progression references ("Castle Age", "Feudal/Castle/Imperial Age",
  // "in Castle/Imperial Age", etc.) before checking for the word "castle" as a
  // defensive-building keyword — otherwise any bonus scaling by age ("Ships
  // +15% HP in Castle/Imperial Age") gets falsely tagged Defensive.
  const tForDefense = t.replace(/\b(dark|feudal|castle|imperial)(\s*\/\s*(dark|feudal|castle|imperial))*\s+age\b/g, ' ');

  const isCamel = /camel/.test(t);
  const isElephant = /elephant/.test(t);
  const isCavArcher = /cavalry archer|mounted archer|horse archer/.test(t);
  const isGunpowder = /gunpowder|hand cannon|cannon galleon|bombard/.test(t);
  const isCavalryish = /cavalry|mounted|knight|hussar|paladin|cataphract|steppe lancer/.test(t);
  const isArcherish = /archer|skirmish|crossbow|longbow|arbalest/.test(t);
  const isInfantry = /infantry|militia|swordsman|spearman|pikeman|halberdier|eagle warrior|champion/.test(t);
  const isSiege = /siege|trebuchet|mangonel|onager|scorpion|\bram\b|battering/.test(t);
  const isNavy = /ship|dock|galley|galleon|fish|naval|harbor|dromon|lou chuan/.test(t);
  const isMonastery = /monk|monaster|faith|relic|conver|church/.test(t);
  const isEco = /villager|farm|food|wood(?!en)|gold\b|stone\b|resource|market|trade|mill\b|mining|lumber|mule cart|technolog.*research|research.*faster|research.*cheaper|technolog.*cheaper|technolog.*faster/.test(t);
  const isDefensive = /tower|castles?\b|\bwalls?\b|\bbuildings?\b|garrison|fortif|elevation/.test(tForDefense);

  if (isCamel) cats.add('Camel');
  if (isElephant) cats.add('Elephant');
  if (isCavArcher) cats.add('Cavalry Archer');
  if (isGunpowder) cats.add('Gunpowder');
  if (isCavalryish && !isArcherish) cats.add('Cavalry');
  if (isArcherish && !isCavArcher) cats.add('Archer');
  if (isInfantry) cats.add('Infantry');
  if (isSiege) cats.add('Siege');
  if (isNavy) cats.add('Naval');
  if (isMonastery) cats.add('Monk');
  if (isEco) cats.add('Eco');
  if (isDefensive) cats.add('Defensive');

  return [...cats];
}

/* Display color for a bonus line — picks the first matching category's color. */
function classifyBonusText(text) {
  const cats = classifyBonusCategories(text);
  if (!cats.length) return 'var(--text2)';
  const arch = CIV_ARCHETYPES.find(a => a.label === cats[0]);
  return arch ? CAT_COLORS[arch.label] || 'var(--text2)' : 'var(--text2)';
}

/* ================================================================
   TIER GRADES (S/A/B/C/D/F) — based on raw score, bell-curve distributed
   ================================================================ */
/* Small candidate pools don't have enough spread to justify a full S-F range —
   being 7th-of-7 in a niche archetype like Elephant isn't "failing," it's just
   less specialized. The available tier range compresses with pool size:
     ≤15 civs  → S/A/B/C only (no D/F)
     ≤46 civs  → S/A/B/C/D   (no F)
     >46 civs  → full S/A/B/C/D/F (the 9 universal archetypes, all 53 civs) */
function tierRangeForPoolSize(n) {
  if (n <= 15) return ['S','A','B','C'];
  if (n <= 46) return ['S','A','B','C','D'];
  return ['S','A','B','C','D','F'];
}

/* Ties share a tier: civs are grouped by distinct score value first, then
   score-groups are distributed across the available tiers proportionally.
   This prevents an arbitrary sort-order tiebreak from giving one civ 'S' and
   an equally-scored civ 'F'. The worst-scoring VALUE always lands in the
   worst available TIER regardless of how many civs share it — weighting by
   tied-group size instead (i.e. by rank-among-civs rather than
   rank-among-values) was tried and rejected: a huge tied clump at the worst
   score can then land in a MIDDLE tier since its average rank position sits
   mid-pack, which is worse than what it replaced. */
function computeGradesFromScored(scored, tiers) {
  const m = tiers.length;
  const uniqueScores = [...new Set(scored.map(s => s.score))].sort((a, b) => b - a);
  const k = uniqueScores.length;
  const grades = {};
  uniqueScores.forEach((score, i) => {
    const tierIdx = k <= 1 ? 0 : Math.min(m - 1, Math.floor(i * m / k));
    scored.filter(s => s.score === score).forEach(s => { grades[s.c] = tiers[tierIdx]; });
  });
  return grades;
}

function computeTierGradesForArchetype(arch) {
  const pool = archetypeCivList(arch);
  const n = pool.length;
  const tiers = tierRangeForPoolSize(n);

  const scored = pool.map(c => ({ c, score: totalScoreCiv(c, arch).total }));
  return computeGradesFromScored(scored, tiers);
}

/* Per-archetype grade computation is expensive (scores every civ in the
   pool), so results are cached per archetype label. civData is only
   populated once (on initial page load) and never changes afterward, so a
   simple never-invalidated cache is safe and turns what was ~1.8 million
   redundant scoring calls (rendering the Tier List view) into a few hundred
   cheap lookups. */
let _tierGradeCache = {};
function tierGradesForArchetype(arch) {
  if (!_tierGradeCache[arch.label]) {
    _tierGradeCache[arch.label] = computeTierGradesForArchetype(arch);
  }
  return _tierGradeCache[arch.label];
}

const GRADE_COLOR = { S:'#FF3355', A:'#FF9500', B:'#FFE500', C:'#39FF6A', D:'#00D4FF', F:'#B026FF' };
const GRADE_VALUE = { S:6, A:5, B:4, C:3, D:2, F:1 };

function civGrade(civName, arch) {
  const pool = archetypeCivList(arch);
  if (!pool.includes(civName)) return null;
  const grades = tierGradesForArchetype(arch);
  return grades[civName] || null;
}

/* Overall grade — weighted rank-based approach.
   Rather than averaging already-bucketed grades (which loses information and
   regresses specialists toward the middle), we:
     1. Normalize each civ's rank within each archetype to [0,1] using dense
        ranking (ties share a group; rank-1 group → 1.0, last group → 0.0).
     2. Apply a 0.5 floor for archetypes where "participating but mediocre"
        should not penalise a civ — Naval, Monk, Camel, Elephant, Cavalry
        Archer, and Gunpowder-when-the-civ-has-any. Gunpowder civs with a
        raw score of 0 (no techs at all) stay at 0.0 — that absence is a
        real weakness worth reflecting.
     3. Sort the civ's normalised scores descending and weight them:
        rank-1 × 1.0, rank-2 × (1 − 1/11), rank-3 × (1 − 2/11), …
        (fixed step of 1/11 across 12 archetypes; min weight ≥ 0).
     4. Divide by the sum of weights used → result in [0,1].
   All 53 civs are then re-ranked and bell-curved into S–F exactly like
   individual archetype grades, so the spread is always meaningful. */

const _OVERALL_NICHE_FLOOR = new Set(['Naval','Monk','Camel','Elephant','Cavalry Archer','Gunpowder']);
const _OVERALL_WEIGHT_STEP = 1 / 11;

function buildOverallRankLookup() {
  const lookup = {};
  CIV_ARCHETYPES.forEach(arch => {
    const pool = archetypeCivList(arch);
    const rawScores = pool.map(c => ({ c, s: totalScoreCiv(c, arch).total }));
    const uniqueScores = [...new Set(rawScores.map(x => x.s))].sort((a, b) => b - a);
    const k = uniqueScores.length;
    const isNiche = _OVERALL_NICHE_FLOOR.has(arch.label);
    const civNorm = {};
    rawScores.forEach(({ c, s }) => {
      const groupIdx = uniqueScores.indexOf(s); // 0 = best group
      let norm = k <= 1 ? 1.0 : (k - 1 - groupIdx) / (k - 1);
      if (isNiche) {
        norm = (arch.label === 'Gunpowder' && s === 0) ? 0.0 : Math.max(0.5, norm);
      }
      civNorm[c] = norm;
    });
    lookup[arch.label] = civNorm;
  });
  return lookup;
}

function rawOverallWeighted(civName, rankLookup) {
  const scores = [];
  CIV_ARCHETYPES.forEach(arch => {
    const civNorm = rankLookup[arch.label];
    if (civNorm && civName in civNorm) scores.push(civNorm[civName]);
  });
  if (!scores.length) return 0;
  scores.sort((a, b) => b - a);
  let wSum = 0, wTotal = 0;
  scores.forEach((s, i) => {
    const w = Math.max(0, 1.0 - i * _OVERALL_WEIGHT_STEP);
    wSum += s * w;
    wTotal += w;
  });
  return wTotal > 0 ? wSum / wTotal : 0;
}

/* The full {grade, avg} map for every civ is computed once and cached —
   this is the single source of truth for both individual grade lookups
   (overallCivGrade) and the Tier List Overall view. */
let _overallGradeCache = null;
function computeAllOverallGrades() {
  const rankLookup = buildOverallRankLookup();
  const all = ALL_CIVS.map(c => ({ c, avg: rawOverallWeighted(c, rankLookup) })).filter(x => x.avg > 0);
  const tiers = tierRangeForPoolSize(all.length);
  const m = tiers.length;
  const uniqueAvgs = [...new Set(all.map(x => x.avg))].sort((a, b) => b - a);
  const k = uniqueAvgs.length;

  const result = {};
  all.forEach(({ c, avg }) => {
    const idx = uniqueAvgs.indexOf(avg);
    const tierIdx = k <= 1 ? 0 : Math.min(m - 1, Math.floor(idx * m / k));
    result[c] = { grade: tiers[tierIdx], avg };
  });
  return result;
}

function getOverallGrades() {
  if (!_overallGradeCache) _overallGradeCache = computeAllOverallGrades();
  return _overallGradeCache;
}

function overallCivGrade(civName) {
  return getOverallGrades()[civName]?.grade || null;
}

/* Clear all grade caches — call once after SiegeEngineers data finishes
   loading, since every score depends on civData which is empty until then. */
function invalidateGradeCaches() {
  _tierGradeCache = {};
  _overallGradeCache = null;
  _mapOverallCache = {};
  invalidateSimCache();
}

/* Map-correlation-weighted overall grades.
   Each civ's score = sum over archetypes of (normalised rank × map weight).
   Positive weight archetypes push the civ up; negative push it down.
   All 53 civs re-ranked into S–F so the bell curve stays meaningful. */
let _mapOverallCache = {};
function computeMapWeightedGrades(mapLabel) {
  if (!dataLoaded) return {};
  const weights = MAP_TECH_WEIGHTS[mapLabel];
  if (!weights) return {};
  const rankLookup = buildOverallRankLookup();
  const scores = {};
  ALL_CIVS.forEach(civ => {
    let sum = 0;
    CIV_ARCHETYPES.forEach(arch => {
      const w = weights[arch.label];
      if (w === undefined) return;
      const civNorm = rankLookup[arch.label];
      if (!civNorm || !(civ in civNorm)) return;
      sum += civNorm[civ] * w;
    });
    scores[civ] = sum;
  });
  const tiers = tierRangeForPoolSize(ALL_CIVS.length);
  const m = tiers.length;
  const uniqueScores = [...new Set(Object.values(scores))].sort((a, b) => b - a);
  const k = uniqueScores.length;
  const result = {};
  ALL_CIVS.forEach(civ => {
    const score = scores[civ];
    const idx = uniqueScores.indexOf(score);
    const tierIdx = k <= 1 ? 0 : Math.min(m - 1, Math.floor(idx * m / k));
    result[civ] = { grade: tiers[tierIdx], score };
  });
  return result;
}
function getMapOverallGrades(mapLabel) {
  if (!_mapOverallCache[mapLabel]) _mapOverallCache[mapLabel] = computeMapWeightedGrades(mapLabel);
  return _mapOverallCache[mapLabel];
}
