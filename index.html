<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AoE2 Civ Reference</title>
<style>
:root {
  --bg:        #0f0d0b;
  --surf:      #1c1814;
  --surf2:     #242018;
  --border:    #332c24;
  --border2:   #4a3f30;
  --amber:     #c8922a;
  --amberL:    #f0b458;
  --amberBg:   rgba(200,146,42,.1);
  --text:      #ede5d8;
  --text2:     #a8967e;
  --text3:     #6b5840;
  --green:     #4ade80;
  --greenBg:   rgba(74,222,128,.07);
  --greenBd:   rgba(74,222,128,.25);
  --red:       #f87171;
  --redBg:     rgba(248,113,113,.07);
  --redBd:     rgba(248,113,113,.25);
  --blue:      #60a5fa;
  --purple:    #a78bfa;
  --blueBg:    rgba(96,165,250,.12);
  --purpleBg:  rgba(167,139,250,.12);
  --radius:    9px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}

/* ── Layout ── */
#app{max-width:1200px;margin:0 auto;padding:16px 16px 80px;}

/* ── Header ── */
header{padding:4px 0 14px;}
h1{font-size:22px;font-weight:700;color:var(--amberL);letter-spacing:-.02em;}
.subtitle{font-size:13px;color:var(--text3);margin-top:3px;}

/* ── Loading / Error ── */
#loading-overlay{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;
}
#loading-overlay.hidden{display:none;}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-text{font-size:14px;color:var(--text3);}
#error-msg{display:none;font-size:13px;color:var(--red);background:var(--redBg);border:1px solid var(--redBd);padding:8px 14px;border-radius:var(--radius);margin-bottom:10px;}

/* ── Search row ── */
.search-row{display:flex;gap:8px;margin-bottom:10px;position:relative;z-index:50;}
.search-wrap{position:relative;flex:1;}
#search-input{
  width:100%;height:44px;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);
  padding:0 14px;color:var(--text);font-size:16px;outline:none;
}
#search-input:focus{border-color:var(--amber);}
#search-input::placeholder{color:var(--text3);}

/* ── Dropdown ── */
#dropdown{
  display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--surf2);border:1px solid var(--border2);border-radius:var(--radius);
  max-height:260px;overflow-y:auto;z-index:100;box-shadow:0 16px 40px rgba(0,0,0,.7);
}
.drop-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);
}
.drop-item:last-child{border-bottom:none;}
.drop-item:hover{background:var(--surf);}
.itype{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.itype.unit{background:var(--blueBg);color:var(--blue);}
.itype.tech{background:var(--purpleBg);color:var(--purple);}

/* ── Mode toggle ── */
.mode-toggle{display:flex;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0;}
.mode-btn{height:44px;padding:0 16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;font-weight:700;letter-spacing:.04em;}
.mode-btn.active{background:var(--amber);color:#1a0a00;}

/* ── Suggestions ── */
.sug-label{font-size:11px;color:var(--text3);margin-bottom:5px;}
#suggestions{margin-bottom:12px;}
.sug-btn{
  font-size:12px;padding:5px 12px;background:var(--surf);border:1px solid var(--border);
  border-radius:20px;color:var(--text2);cursor:pointer;transition:.12s;
}
.sug-btn:hover{border-color:var(--amber);color:var(--amberL);}

/* ── Filter chips ── */
#filter-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;min-height:4px;}
.filter-chip{
  display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 10px 0 12px;
  background:var(--surf);border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;
  transition:border-color .12s;
}
.filter-chip:hover{border-color:var(--amber);}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.chip-dot.unit{background:var(--blue);}
.chip-dot.tech{background:var(--purple);}
.chip-x{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;line-height:1;margin-left:2px;}
.chip-x:hover{color:var(--red);}
.clear-all{font-size:12px;color:var(--text3);cursor:pointer;padding:5px 8px;background:none;border:none;align-self:center;}
.clear-all:hover{color:var(--red);}

/* ── Status bar ── */
#status-bar{font-size:12px;color:var(--text3);min-height:18px;margin-bottom:6px;}

/* ── Grid sections ── */
.section-hdr{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  padding:12px 0 7px;border-top:1px solid var(--border);margin-top:4px;
}
.section-hdr.all{color:var(--text3);}
.section-hdr.has{color:var(--green);}
.section-hdr.missing{color:var(--red);opacity:.75;}
.section-hdr.unknown{color:var(--text3);}

.civ-grid{display:grid;gap:7px;grid-template-columns:repeat(2,1fr);}
@media(min-width:480px){.civ-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:640px){.civ-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:860px){.civ-grid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1060px){.civ-grid{grid-template-columns:repeat(6,1fr);}}

.civ-card{
  background:var(--surf);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;min-height:52px;cursor:pointer;
  transition:border-color .12s,opacity .12s,box-shadow .12s;
}
.civ-card:hover{border-color:var(--amber);}
.civ-card.has{border-color:var(--greenBd);background:var(--greenBg);}
.civ-card.has:hover{border-color:var(--green);}
.civ-card.missing{border-color:var(--redBd);background:var(--redBg);opacity:.65;}
.civ-card.missing:hover{opacity:1;border-color:var(--red);}
.civ-card.unknown{opacity:.6;}
.civ-card.active{box-shadow:0 0 0 2px var(--amber);border-color:var(--amber) !important;opacity:1 !important;}
.cname{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.ctags{display:flex;flex-wrap:wrap;gap:3px;}
.ctag{font-size:10px;padding:1px 6px;border-radius:7px;}
.ctag.has{background:var(--greenBg);color:var(--green);border:1px solid var(--greenBd);}
.ctag.missing{background:var(--redBg);color:var(--red);border:1px solid var(--redBd);text-decoration:line-through;}
.ctag.unknown{background:var(--surf2);color:var(--text3);border:1px solid var(--border);}

/* ── Info panel (mobile — always in flow) ── */
#info-panel{
  display:none;margin-top:20px;padding:16px;
  background:var(--surf);border:1px solid var(--border);border-radius:12px;
}
#info-panel.visible{display:block;}
.close-panel{float:right;background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;line-height:1;padding:0;}
.close-panel:hover{color:var(--text);}

/* ── Tooltip (desktop hover — position:fixed) ── */
#tooltip{
  display:none;position:fixed;width:320px;
  background:var(--surf2);border:1px solid var(--border2);border-radius:12px;
  padding:16px;box-shadow:0 24px 60px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.03);
  z-index:1000;pointer-events:none;
}

/* ── Shared info content styles ── */
.info-name{font-size:17px;font-weight:700;color:var(--amberL);margin-bottom:12px;line-height:1.2;}
.info-hdr-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.info-hdr-row .info-name{margin-bottom:0;}
.info-sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:12px 0 6px;}
.info-sl:first-child{margin-top:0;}
.wr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;text-align:center;}
.wr-lbl{font-size:9px;color:var(--text3);margin-bottom:2px;line-height:1.2;}
.wr-val{font-size:13px;font-weight:700;}
.wr-val.g{color:var(--green);}
.wr-val.r{color:var(--red);}
.wr-val.y{color:var(--amberL);}
.bonus-list{list-style:none;}
.bonus-item{font-size:12px;color:var(--text2);display:flex;gap:7px;margin-bottom:5px;line-height:1.4;}
.bonus-item::before{content:"▸";color:var(--amber);flex-shrink:0;margin-top:1px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.stat-cell{background:var(--surf);border:1px solid var(--border);border-radius:7px;padding:6px 8px;}
.stat-lbl{font-size:10px;color:var(--text3);}
.stat-val{font-size:14px;font-weight:700;color:var(--text);}
.atk-bonus{display:inline-block;font-size:11px;padding:2px 8px;background:rgba(251,191,36,.1);color:#fbbf24;border-radius:20px;margin:2px;}
.cost-row{font-size:12px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;}
.u-chip{font-size:11px;padding:3px 10px;background:var(--greenBg);color:var(--green);border:1px solid var(--greenBd);border-radius:20px;}
.t-chip{font-size:11px;padding:3px 10px;background:var(--purpleBg);color:var(--purple);border:1px solid rgba(167,139,250,.3);border-radius:20px;}
.civ-pill{font-size:11px;padding:3px 9px;background:var(--surf);border:1px solid var(--border);border-radius:20px;color:var(--text2);}
.ibadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.ibadge.unit{background:var(--blueBg);color:var(--blue);}
.ibadge.tech{background:var(--purpleBg);color:var(--purple);}
.age-lbl{font-size:11px;color:var(--text3);}
.disclaimer{font-size:11px;color:var(--text3);font-style:italic;margin-top:8px;}

/* ── Footer note ── */
/* Organized quick-filter categories */
.cat-section{margin-bottom:10px;}
.cat-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;}
.cat-btns{display:flex;flex-wrap:wrap;gap:5px;}
.footer{font-size:11px;color:var(--text3);text-align:center;margin-top:30px;padding-top:16px;border-top:1px solid var(--border);}
.footer a{color:var(--text2);text-decoration:none;}
.footer a:hover{color:var(--amberL);}
</style>
</head>

<!-- Loading overlay -->

<!-- Main app -->

  <div id="suggestions"></div>

  <!-- Active filter chips -->
  <div id="filter-chips"></div>

  <!-- Status -->
  <div id="status-bar"></div>

  <!-- Civ grid -->
  <div id="civ-section"></div>

  <!-- Info panel (visible on mobile tap, or desktop click) -->
  <div id="info-panel"></div>

  <div class="footer">

    Win rates approximate (aoestats.io) · Built for AoE2 DE

</div>

const DATA_URL = 'https://raw.githubusercontent.com/SiegeEngineers/aoe2techtree/master/data/data.json';

/* ================================================================
   DATA LOADING
   ================================================================ */
async function loadData() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    parseRaw(raw);
    dataLoaded = true;
    // Show brief load-success note
    const n = Object.keys(unitsById).length + Object.keys(techsById).length;
    const note = document.getElementById('error-msg');
    if (n > 0) {
      note.style.color = 'var(--green)';
      note.style.background = 'var(--greenBg)';
      note.style.borderColor = 'var(--greenBd)';
      note.textContent = `✓ Loaded ${Object.keys(unitsById).length} units and ${Object.keys(techsById).length} techs — use search or tap a quick filter`;
      note.style.display = 'block';
      setTimeout(() => { note.style.display = 'none'; }, 3500);
    } else {
      note.textContent = 'Data loaded but could not parse unit list. Try refreshing.';
      note.style.display = 'block';
      console.warn('parseRaw produced 0 units. Raw top-level keys:', Object.keys(raw));
    }
  } catch(e) {
    const el = document.getElementById('error-msg');
    el.textContent = 'Could not load unit data — civ bonuses and win rates still work. Check your internet connection.';
    el.style.display = 'block';
  }
  document.getElementById('loading-overlay').classList.add('hidden');
  render();
  // Execute any suggestion the user clicked while loading
  if (pendingQ) { const q = pendingQ; pendingQ = null; selectFromName(q); }
}

/* The SiegeEngineers data.json structure (verified):
     raw.data.Unit  – object keyed by numeric string ID, fields: HP, Attack,
                      MeleeArmor, PierceArmor, Range, Speed, LineOfSight,
                      Cost, Attacks (attack bonuses), internal_name
     raw.data.Tech  – object keyed by numeric string ID, fields: Cost,
                      ResearchTime, internal_name
     raw.civs       – object keyed by civ NAME (e.g. "Britons"), each with:
                        Unit: array of numeric unit IDs available to that civ
                        Tech: array of numeric tech IDs available to that civ
   Unit names are NOT stored; we use the hardcoded UNIT_IDS map above. */
function parseRaw(raw) {
  const du = raw?.data?.Unit || {};
  const dt = raw?.data?.Tech || {};
  const civObj = raw?.civs || {};

  Object.entries(du).forEach(([id, u]) => { unitsById[+id] = u; });
  Object.entries(dt).forEach(([id, t]) => { techsById[+id] = t; });

  Object.entries(civObj).forEach(([name, c]) => {
    civData[name] = {
      units: new Set((c.Unit || []).map(Number)),
      techs: new Set((c.Tech || []).map(Number)),
    };
  });

  // Build search index from hardcoded name→ID maps (data.json has no readable names)
  searchIdx = [
    ...Object.entries(UNIT_IDS).map(([name, id]) => ({ id, name, itemType: 'unit' })),
    ...Object.entries(TECH_IDS).map(([name, id]) => ({ id, name, itemType: 'tech' })),
  ].sort((a, b) => a.name.localeCompare(b.name));
}

/* ================================================================
   SEARCH & SELECTION
   ================================================================ */
function doSearch(q) {
  if (!q.trim()) return [];
  const lq = q.toLowerCase();
  return searchIdx
    .filter(i => i.name.toLowerCase().includes(lq) && !isSelected(i))
    .slice(0, 16);
}

function isSelected(item) {
  return selected.some(s => s.id === item.id && s.itemType === item.itemType);
}

function selectItem(item) {
  if (isSelected(item)) return;
  const csWith = new Set(ALL_CIVS.filter(civ => {
    const cd = civData[civ];
    if (!cd) return false;
    return item.itemType === 'unit' ? cd.units.has(item.id) : cd.techs.has(item.id);
  }));
  const fullData = item.itemType === 'unit' ? unitsById[item.id] : techsById[item.id];
  selected.push({ ...item, civsWith: csWith, data: fullData || {} });
  document.getElementById('search-input').value = '';
  closeDropdown();
  render();
  showItemInfo(selected.length - 1);
}

function removeItem(i) {
  selected.splice(i, 1);
  if (!selected.length) {
    activeCard = null;
    document.getElementById('info-panel').classList.remove('visible');
  }
  render();
}

function clearAll() {
  selected = [];
  activeCard = null;
  document.getElementById('info-panel').classList.remove('visible');
  render();
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-all').classList.toggle('active', m === 'ALL');
  document.getElementById('mode-any').classList.toggle('active', m === 'ANY');
  render();
}

/* ================================================================
   FILTERING
   ================================================================ */
function civStatus(civ) {
  if (!selected.length) return 'neutral';
  const cd = civData[civ];
  if (!cd) return 'unknown';
  const results = selected.map(item =>
    item.itemType === 'unit' ? cd.units.has(item.id) : cd.techs.has(item.id)
  );
  if (mode === 'ALL') return results.every(Boolean) ? 'has' : 'missing';
  return results.some(Boolean) ? 'has' : 'missing';
}

/* ================================================================
   RENDERING
   ================================================================ */
function render() {
  renderChips();
  renderGrid();
  renderStatus();
}

function renderStatus() {
  const el = document.getElementById('status-bar');
  if (!selected.length) { el.textContent = ''; return; }
  const n = ALL_CIVS.filter(c => civStatus(c) === 'has').length;
  const lbl = selected.map(s => s.name).join(' + ');
  el.textContent = `${n} of 53 civs have ${lbl}`;
}

function renderChips() {
  const el = document.getElementById('filter-chips');
  if (!selected.length) { el.innerHTML = ''; return; }
  let html = selected.map((item, i) =>
    `<div class="filter-chip" data-i="${i}">
       <span class="chip-dot ${item.itemType}"></span>
       <span>${item.name}</span>
       <button class="chip-x" data-rm="${i}" aria-label="Remove ${item.name}">×</button>
     </div>`
  ).join('');
  if (selected.length > 1) html += `<button class="clear-all">Clear all</button>`;
  el.innerHTML = html;

  el.querySelectorAll('.filter-chip').forEach((chip, i) => {
    chip.addEventListener('click', e => {
      if (e.target.classList.contains('chip-x')) { removeItem(+e.target.dataset.rm); return; }
      showItemInfo(i);
    });
    chip.addEventListener('mouseenter', e => { if (!isMobile) showItemTooltip(i, e); });
    chip.addEventListener('mousemove', moveTooltip);
    chip.addEventListener('mouseleave', hideTooltip);
  });
  el.querySelector('.clear-all')?.addEventListener('click', clearAll);
}

function renderGrid() {
  const has = [], missing = [], unknown = [];
  ALL_CIVS.forEach(c => {
    const s = civStatus(c);
    if (s === 'has') has.push(c);
    else if (s === 'missing') missing.push(c);
    else if (s === 'unknown') unknown.push(c);
  });

  const lbl = selected.length === 0 ? '' :
              selected.length === 1 ? selected[0].name : `all ${selected.length} items`;
  let html = '';

  if (!selected.length) {
    // No filter active — show everything
    const neutral = ALL_CIVS;
    html += `<div class="section-hdr all">All ${neutral.length} civilizations</div>`;
    html += `<div class="civ-grid">${neutral.map(c => cardHtml(c, 'neutral')).join('')}</div>`;
  } else {
    if (has.length) {
      html += `<div class="section-hdr has">✓ Has ${lbl} &mdash; ${has.length} civs</div>`;
      html += `<div class="civ-grid">${has.map(c => cardHtml(c, 'has')).join('')}</div>`;
    }
    if (missing.length) {
      html += `<div class="section-hdr missing">✗ Missing &mdash; ${missing.length} civs</div>`;
      html += `<div class="civ-grid">${missing.map(c => cardHtml(c, 'missing')).join('')}</div>`;
    }
    if (unknown.length) {
      html += `<div class="section-hdr unknown">? Data unavailable &mdash; ${unknown.length} civs</div>`;
      html += `<div class="civ-grid">${unknown.map(c => cardHtml(c, 'unknown')).join('')}</div>`;
    }
  }

  document.getElementById('civ-section').innerHTML = html;

  // Attach events to cards
  document.querySelectorAll('.civ-card').forEach(card => {
    const civ = card.dataset.civ;
    card.addEventListener('click', () => {
      activeCard = civ;
      document.querySelectorAll('.civ-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      showCivInfo(civ);
    });
    card.addEventListener('mouseenter', e => { if (!isMobile) showCivTooltip(civ, e); });
    card.addEventListener('mousemove', moveTooltip);
    card.addEventListener('mouseleave', hideTooltip);
  });
}

function cardHtml(civ, status) {
  const isActive = activeCard === civ ? ' active' : '';
  const cd = civData[civ];
  const tags = selected.map(item => {
    if (!cd) return `<span class="ctag unknown">${item.name}</span>`;
    const h = item.itemType === 'unit' ? cd.units.has(item.id) : cd.techs.has(item.id);
    return `<span class="ctag ${h ? 'has' : 'missing'}">${item.name}</span>`;
  }).join('');
  return `<div class="civ-card ${status}${isActive}" data-civ="${civ}">
    <div class="cname">${civ}</div>
    ${selected.length ? `<div class="ctags">${tags}</div>` : ''}
  </div>`;
}

/* ================================================================

   ================================================================ */
function civInfoHtml(civName) {
  const wr = WIN_RATES[civName] || [];
  const bonuses = CIV_BONUSES[civName] || [];
  const cd = civData[civName] || {};
  const uNames = [];   // Unique unit names not available from this data structure
  const tNames = [];
  const isNew = NEW_CIVS.has(civName);

  let h = `<div class="info-name">${civName}</div>`;
  const focus = CIV_FOCUS[civName];
  if (focus) h += `<div style="font-size:12px;color:var(--amber);margin-bottom:10px;font-weight:500">${focus}</div>`;

  if (wr.length) {
    h += `<div class="info-sl">Win rates &middot; 1v1 RM ${isNew ? '(estimated)' : '(approx)'}</div>`;
    h += `<div class="wr-grid">`;
    WRL.forEach((lbl, i) => {
      const r = wr[i];
      const cls = r >= 52.5 ? 'g' : r <= 49.5 ? 'r' : 'y';
      h += `<div><div class="wr-lbl">${lbl}</div><div class="wr-val ${cls}">${r}%</div></div>`;
    });
    h += `</div>`;
  }

  if (uNames.length || tNames.length) {
    h += `<div class="info-sl">Unique units &amp; technologies</div>`;
    h += `<div class="chip-row">`;
    uNames.forEach(n => h += `<span class="u-chip">${n}</span>`);
    tNames.forEach(n => h += `<span class="t-chip">${n}</span>`);
    h += `</div>`;
  }

  if (bonuses.length) {
    h += `<div class="info-sl" style="margin-top:12px">Civilization bonuses</div>`;
    h += `<ul class="bonus-list">`;
    bonuses.forEach(b => h += `<li class="bonus-item">${b}</li>`);
    h += `</ul>`;
  }

  if (isNew) h += `<p class="disclaimer">New civilization &mdash; win rates may not yet reflect current meta.</p>`;

  return h;
}

function itemInfoHtml(item) {
  if (!item) return '';
  const d = item.data || {};

  let h = `<div class="info-hdr-row">
    <span class="ibadge ${item.itemType}">${item.itemType}</span>
    <span class="info-name">${item.name}</span>
  </div>`;

  // Stats (units) — SiegeEngineers uses PascalCase: HP, Attack, MeleeArmor, etc.
  if (item.itemType === 'unit') {
    const pairs = [
      ['HP', d.HP], ['Attack', d.Attack],
      ['Melee', d.MeleeArmor], ['Pierce', d.PierceArmor],
      ...(d.Range > 0 ? [['Range', d.Range]] : []),
      ['Speed', d.Speed], ['LOS', d.LineOfSight],
    ].filter(([, v]) => v != null);

    if (pairs.length) {
      h += `<div class="stat-grid">`;
      pairs.forEach(([k, v]) => h += `<div class="stat-cell"><div class="stat-lbl">${k}</div><div class="stat-val">${typeof v === 'number' ? Math.round(v * 100) / 100 : v}</div></div>`);
      h += `</div>`;
    }

    // Attacks: [{Amount, Class}] — skip base pierce/melee (class 3 & 4)
    const atks = (d.Attacks || []).filter(b => b.Amount > 0 && b.Class > 4);
    if (atks.length) {
      h += `<div style="margin-top:6px">`;
      atks.forEach(b => {
        const cls = ARMOR_CLASSES[b.Class] || `class ${b.Class}`;
        h += `<span class="atk-bonus">+${b.Amount} vs ${cls}</span>`;
      });
      h += `</div>`;
    }
  }

  // Tech info
  if (item.itemType === 'tech') {
    const nm = d.internal_name || '';
    if (nm) h += `<p style="font-size:12px;color:var(--text2);margin-top:8px">${nm}</p>`;
    if (d.ResearchTime) h += `<p style="font-size:12px;color:var(--text3);margin-top:4px">Research time: ${d.ResearchTime}s</p>`;
  }

  // Cost — SiegeEngineers uses "Cost" (capital C)
  const cost = d.Cost || d.cost;
  if (cost) {
    const costs = Object.entries(cost).filter(([,v]) => v > 0).map(([k,v]) => `${v} ${k}`).join(' · ');
    if (costs) h += `<div class="cost-row">Cost: ${costs}</div>`;
  }

  // Which civs have it
  const n = item.civsWith?.size || 0;
  if (n) {
    h += `<div class="info-sl" style="margin-top:12px">Available to ${n} of 53 civs</div>`;
    h += `<div class="chip-row">`;
    [...(item.civsWith || [])].sort().forEach(c => h += `<span class="civ-pill">${c}</span>`);
    h += `</div>`;
  }

  return h;
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('visible');
  activeCard = null;
  document.querySelectorAll('.civ-card').forEach(c => c.classList.remove('active'));
}

// Desktop tooltip
function showCivTooltip(civ, e) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = civInfoHtml(civ);
  tt.style.display = 'block';
  moveTooltip(e);
}

/* Build a temporary item object (for suggestion-button hover preview) */
function buildTempItem(name) {
  const uid = UNIT_IDS[name], tid = TECH_IDS[name];
  if (uid === undefined && tid === undefined) return null;
  const id = uid ?? tid;
  const itemType = uid !== undefined ? 'unit' : 'tech';
  const d = itemType === 'unit' ? unitsById[id] : techsById[id];
  const civsWith = new Set(ALL_CIVS.filter(civ => {
    const cd = civData[civ];
    if (!cd) return false;
    return itemType === 'unit' ? cd.units.has(id) : cd.techs.has(id);
  }));
  return { id, name, itemType, civsWith, data: d || {} };
}

function showItemTooltip(idxOrItem, e) {
  const item = typeof idxOrItem === 'number' ? selected[idxOrItem] : idxOrItem;
  if (!item) return;
  const tt = document.getElementById('tooltip');
  tt.innerHTML = itemInfoHtml(item);
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  if (tt.style.display === 'none') return;
  const W = 320, H = tt.offsetHeight || 420;
  const left = e.clientX + 18 + W > window.innerWidth ? e.clientX - W - 12 : e.clientX + 18;
  const top  = Math.max(8, Math.min(e.clientY - 30, window.innerHeight - H - 8));
  tt.style.left = left + 'px';
  tt.style.top  = top  + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

/* ================================================================
   DROPDOWN
   ================================================================ */
function updateDropdown(q) {
  dropItems = doSearch(q);
  const dd = document.getElementById('dropdown');
  if (!q.trim() || !dropItems.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = dropItems.map((item, i) =>
    `<div class="drop-item" data-i="${i}">
       <span>${item.name}</span>
       <span class="itype ${item.itemType}">${item.itemType}</span>
     </div>`
  ).join('');
  dd.style.display = 'block';
  dd.querySelectorAll('.drop-item').forEach((el, i) => {
    el.addEventListener('mousedown', e => { e.preventDefault(); selectItem(dropItems[i]); });
  });
}

function closeDropdown() {
  dropItems = [];
  document.getElementById('dropdown').style.display = 'none';
}

/* ================================================================
   SUGGESTIONS
   ================================================================ */
function renderSuggestions() {
  const el = document.getElementById('suggestions');
  el.innerHTML = QUICK_CATEGORIES.map(cat => `
    <div class="cat-section">
      <span class="cat-label">${cat.label}</span>
      <div class="cat-btns">
        ${cat.items.map(q => `<button class="sug-btn" data-q="${q}">${q}</button>`).join('')}
      </div>
    </div>
  `).join('');

  // Attach click + desktop hover to every suggestion button
  el.querySelectorAll('.sug-btn').forEach(btn => {
    const name = btn.dataset.q;
    btn.addEventListener('click', () => handleSuggestion(name));
    btn.addEventListener('mouseenter', e => {
      if (!isMobile && dataLoaded) {
        const item = buildTempItem(name);
        if (item) showItemTooltip(item, e);
      }
    });
    btn.addEventListener('mousemove', moveTooltip);
    btn.addEventListener('mouseleave', hideTooltip);
  });
}

function selectFromName(q) {
  const lq = q.toLowerCase();
  const item = searchIdx.find(i => i.name.toLowerCase() === lq)
            || searchIdx.find(i => i.name.toLowerCase().includes(lq));
  if (item) selectItem(item);
}

function handleSuggestion(q) {
  if (!dataLoaded) {
    // Queue it — will be run immediately once loadData() finishes
    pendingQ = q;
    const note = document.getElementById('error-msg');
    note.style.color = 'var(--amberL)';
    note.style.background = 'var(--amberBg)';
    note.style.borderColor = 'var(--amber)';
    note.textContent = `Loading data… "${q}" will be applied automatically.`;
    note.style.display = 'block';
    return;
  }
  selectFromName(q);
}

/* ================================================================
   EVENTS
   ================================================================ */
function initEvents() {
  // Mobile detection
  isMobile = !window.matchMedia('(hover:hover) and (pointer:fine)').matches;
  window.addEventListener('resize', () => {
    isMobile = !window.matchMedia('(hover:hover) and (pointer:fine)').matches;
  });

  // Search input
  const input = document.getElementById('search-input');
  input.addEventListener('input', e => updateDropdown(e.target.value));
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDropdown();
    if (e.key === 'Enter') {
      if (dropItems.length) { selectItem(dropItems[0]); }
      else if (e.target.value.trim()) { selectFromName(e.target.value.trim()); }
    }
  });
  input.addEventListener('blur', () => setTimeout(closeDropdown, 160));
  input.addEventListener('focus', e => { if (e.target.value) updateDropdown(e.target.value); });

  // Mode buttons
  document.getElementById('mode-all').addEventListener('click', () => setMode('ALL'));
  document.getElementById('mode-any').addEventListener('click', () => setMode('ANY'));

  // Hide tooltip on scroll
  window.addEventListener('scroll', hideTooltip, { passive: true });
}

/* ================================================================
   INIT
   ================================================================ */
document.addEventListener('DOMContentLoaded', () => {
  renderSuggestions();
  initEvents();
  loadData();
});
</script>
</body>
</html>
