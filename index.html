  if (cost) {
    const costs = Object.entries(cost).filter(([,v]) => v > 0).map(([k,v]) => `${v} ${k}`).join(' · ');
    if (costs) h += `<div class="cost-row">Cost: ${costs}</div>`;
  }

  const n = item.civsWith?.size || 0;
  if (n > 3) {
    h += `<div class="info-sl" style="margin-top:12px">Available to ${n} of 53 civs</div>`;
    h += `<div class="chip-row">${[...(item.civsWith||[])].sort().map(c => `<span class="civ-pill">${c}</span>`).join('')}</div>`;
  }
  return h;
}

/* ================================================================
   PANEL + TOOLTIP
   ================================================================ */
let civViewHistory = []; // most recent first, excludes the currently-viewed civ
function showCivInfo(civ) {
  // Track history: push the civ we're navigating AWAY from (if any), dedupe, cap at 8
  const prevCiv = window._currentCivInfo;
  if (prevCiv && prevCiv !== civ) {
    civViewHistory = [prevCiv, ...civViewHistory.filter(c => c !== prevCiv && c !== civ)].slice(0, 8);
  } else {
    civViewHistory = civViewHistory.filter(c => c !== civ);
  }
  window._currentCivInfo = civ;
  const p = document.getElementById('info-panel');
  p.innerHTML = `<button class="close-panel" onclick="closePanel()">×</button>` + civInfoHtml(civ, false);
  p.classList.add('visible');
  p.querySelectorAll('.arch-rank-ring').forEach(el => {
    el.addEventListener('click', () => {
      selectArchetype(+el.dataset.archI);
      showCivInfo(civ);
    });
  });
  p.querySelectorAll('[data-similar-civ]').forEach(el => {
    el.addEventListener('click', () => showCivInfo(el.dataset.similarCiv));
  });
  p.querySelectorAll('[data-history-civ]').forEach(el => {
    el.addEventListener('click', () => showCivInfo(el.dataset.historyCiv));
  });
  p.querySelectorAll('[data-uu-name]').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.uuName;
      const item = searchIdx.find(x => x.name === name && x.itemType === 'unit');
      if (!item) return;
      const existing = p.querySelector('.civ-secondary-card');
      if (existing && existing.dataset.cardKey === name) { existing.remove(); return; }
      if (existing) existing.remove();
      const sec = document.createElement('div');
      sec.className = 'civ-secondary-card';
      sec.dataset.cardKey = name;
      // Build content: itemInfoHtml + fallback civ/desc if data is sparse
      const baseHtml = itemInfoHtml(item);
      const civName = (typeof UU_CIV_MAP !== 'undefined' && UU_CIV_MAP[name]) || '';
      const hasStats = item.data && Object.values(item.data).some(v => v != null && v !== 0);
      const fallback = !hasStats ? `<p style="font-size:12px;color:var(--text2);margin:6px 0">
        ${civName ? `<b style="color:var(--amberL)">${civName}</b> unique unit` : 'Unique unit'}
        ${UNIT_DESCRIPTIONS[item.id] ? '' : ' — no additional stats available in tech tree data'}
        </p>` : '';
      sec.innerHTML = `<div style="margin:14px 0 0;border-top:1px solid var(--border);padding-top:12px">${baseHtml}${fallback}</div>`;
      p.appendChild(sec);
      sec.scrollIntoView({ behavior:'smooth', block:'nearest' });
    });
  });
  p.querySelectorAll('[data-item-name]').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.itemName;
      const type = el.dataset.itemType;
      const item = searchIdx.find(x => x.name === name && x.itemType === type);
      if (!item) return;
      const existing = p.querySelector('.civ-secondary-card');
      if (existing && existing.dataset.cardKey === name + '|' + type) { existing.remove(); return; }
      if (existing) existing.remove();
      const sec = document.createElement('div');
      sec.className = 'civ-secondary-card';
      sec.dataset.cardKey = name + '|' + type;
      sec.innerHTML = `<div style="margin:14px 0 0;border-top:1px solid var(--border);padding-top:12px">${itemInfoHtml(item)}</div>`;
      p.appendChild(sec);
      sec.scrollIntoView({ behavior:'smooth', block:'nearest' });
    });
  });
  if (isMobile) p.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function showItemInfo(idx) {
  const p = document.getElementById('info-panel');
  p.innerHTML = `<button class="close-panel" onclick="closePanel()">×</button>` + itemInfoHtml(selected[idx]);
  p.classList.add('visible');
  if (isMobile) p.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('visible');
  activeCard = null;
  civViewHistory = [];
  window._currentCivInfo = null;
  document.querySelectorAll('.civ-card').forEach(c => c.classList.remove('active'));
}

function showCivTooltip(civ, e) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = civInfoHtml(civ, true);
  tt.style.display = 'block';
  moveTooltip(e);
}

function showItemTooltip(item, e) {
  if (!item) return;
  const tt = document.getElementById('tooltip');
  tt.innerHTML = itemInfoHtml(item);
  tt.style.display = 'block';
  moveTooltip(e);
}

/* Position tooltip BELOW the cursor (not to the right) so it never covers
   the next civ cards the user is likely to click. Falls back to above if
   there isn't enough room below the viewport. */
function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  if (tt.style.display === 'none') return;
  const W = 340;
  const H = tt.offsetHeight || 420;
  let left = e.clientX - W / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - W - 8));
  let top = e.clientY + 22;
  if (top + H > window.innerHeight - 8) {
    top = e.clientY - H - 16; // flip above if no room below
    if (top < 8) top = 8;
  }
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}
/* ================================================================
   DROPDOWN
   ================================================================ */
function updateDropdown(q) {
  dropItems = doSearch(q);
  const dd = document.getElementById('dropdown');
  if (!q.trim() || !dropItems.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = dropItems.map((item,i) =>
    `<div class="drop-item" data-i="${i}">
       <span>${item.name}</span>
       <span class="itype ${item.itemType}">${item.itemType}</span>
     </div>`
  ).join('');
  dd.style.display = 'block';
  dd.querySelectorAll('.drop-item').forEach((el,i) => {
    el.addEventListener('mousedown', e => { e.preventDefault(); selectItem(dropItems[i]); });
  });
}

function closeDropdown() { dropItems = []; document.getElementById('dropdown').style.display = 'none'; }

/* ================================================================
   SUGGESTIONS (quick filter buttons)
   ================================================================ */
function getItemCivCount(name) {
  if (!dataLoaded) return null;
  const uid = UNIT_IDS[name], tid = TECH_IDS[name];
  const raw = uid ?? tid;
  if (raw === undefined) return null;
  const itemType = uid !== undefined ? 'unit' : 'tech';
  const ids = Array.isArray(raw) ? raw : [raw];
  return ALL_CIVS.filter(civ => {
    const cd = civData[civ];
    if (!cd) return false;
    return itemType === 'unit' ? ids.some(id => cd.units.has(id)) : ids.some(id => cd.techs.has(id));
  }).length;
}

function buildTempItem(name) {
  const uid = UNIT_IDS[name], tid = TECH_IDS[name];
  if (uid === undefined && tid === undefined) return null;
  const raw = uid ?? tid;
  const itemType = uid !== undefined ? 'unit' : 'tech';
  const ids = Array.isArray(raw) ? raw : [raw];
  const id = ids[0];
  const d = itemType === 'unit' ? unitsById[id] : techsById[id];
  const civsWith = new Set(ALL_CIVS.filter(civ => {
    const cd = civData[civ];
    if (!cd) return false;
    return itemType === 'unit' ? ids.some(i => cd.units.has(i)) : ids.some(i => cd.techs.has(i));
  }));
  return { id, ids, name, itemType, civsWith, data: d || {} };
}

function selectFromName(q) {
  const lq = q.toLowerCase();
  const item = searchIdx.find(i => i.name.toLowerCase() === lq)
            || searchIdx.find(i => i.name.toLowerCase().includes(lq));
  if (item) selectItem(item);
}

/* Toggle: if already selected, remove it; otherwise add it (or queue if data
   still loading). This lets a quick-filter button act as an on/off switch. */
function handleSuggestion(q) {
  if (!dataLoaded) {
    pendingQ = q;
    const el = document.getElementById('error-msg');
    el.style.color = 'var(--amberL)';
    el.style.background = 'var(--amberBg)';
    el.style.borderColor = 'var(--amber)';
    el.textContent = `Loading… "${q}" will be applied when data is ready.`;
    el.style.display = 'block';
    return;
  }
  const existingIdx = selected.findIndex(s => s.name === q);
  if (existingIdx !== -1) { removeItem(existingIdx); renderSuggestions(); return; }
  selectFromName(q);
}

function renderSuggestions() {
  const total = ALL_CIVS.length;

  const sortItems = (items) => {
    const units = items.filter(q => UNIT_IDS[q] !== undefined);
    const techs = items.filter(q => TECH_IDS[q] !== undefined);
    const sortGroup = (arr) => {
      const withCount = arr.map(q => ({ q, n: getItemCivCount(q) }));
      const notAll = withCount.filter(x => x.n === null || x.n < total).sort((a, b) => (a.n||999) - (b.n||999));
      const all = withCount.filter(x => x.n === total);
      return [...notAll, ...all].map(x => x.q);
    };
    return [...sortGroup(units), ...sortGroup(techs)];
  };

  const el = document.getElementById('suggestions');
  el.innerHTML = QUICK_CATEGORIES.map(cat => {
    const sorted = sortItems(cat.items);
    const btns = sorted.map(q => {
      const n = getItemCivCount(q);
      const isAll = n === total;
      const isSel = selected.some(s => s.name === q);
      const badge = n !== null ? `<span class="sug-cnt ${isAll ? 'all' : 'few'}">${isAll ? 'all' : n}</span>` : '';
      let style = '';
      if (isSel) style = `style="background:${cat.color};border-color:${cat.color};color:#0f0d0b"`;
      const cls = `sug-btn${isAll ? ' sug-all' : ''}${isSel ? ' sel' : ''}`;
      return `<button class="${cls}" ${style} data-q="${q}">${q}${badge}</button>`;
    }).join('');
    return `<div class="cat-section"><span class="cat-label" style="color:${cat.color}">${cat.label}</span><div class="cat-btns">${btns}</div></div>`;
  }).join('');

  el.querySelectorAll('.sug-btn').forEach(btn => {
    const name = btn.dataset.q;
    btn.addEventListener('click', () => { handleSuggestion(name); renderSuggestions(); });
    btn.addEventListener('mouseenter', e => {
      if (!isMobile && dataLoaded) {
        const item = buildTempItem(name);
        if (item) showItemTooltip(item, e);
      }
    });
    btn.addEventListener('mousemove', moveTooltip);
    btn.addEventListener('mouseleave', hideTooltip);
  });
}

/* ================================================================
   EVENTS
   ================================================================ */
function initEvents() {
  isMobile = !window.matchMedia('(hover:hover) and (pointer:fine)').matches;
  window.addEventListener('resize', () => {
    isMobile = !window.matchMedia('(hover:hover) and (pointer:fine)').matches;
  });
  const input = document.getElementById('search-input');
  input.addEventListener('input', e => updateDropdown(e.target.value));
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDropdown();
    if (e.key === 'Enter') {
      if (dropItems.length) selectItem(dropItems[0]);
      else if (e.target.value.trim()) selectFromName(e.target.value.trim());
    }
  });
  input.addEventListener('blur', () => setTimeout(closeDropdown, 160));
  input.addEventListener('focus', e => { if (e.target.value) updateDropdown(e.target.value); });
  document.getElementById('mode-all').addEventListener('click', () => setMode('ALL'));
  document.getElementById('mode-any').addEventListener('click', () => setMode('ANY'));
  window.addEventListener('scroll', hideTooltip, { passive: true });
}

/* ================================================================
   INIT
   ================================================================ */
document.addEventListener('DOMContentLoaded', () => {
  renderSuggestions();
  initEvents();
  loadData();
  loadPlayerData();
});
</script>
<script>
(function() {
  const tip = document.getElementById('uu-tooltip');
  if (!tip) return;
  const tipName = tip.querySelector('.tt-name');
  const tipDesc = tip.querySelector('.tt-desc');
  let hideTimer;
  document.addEventListener('mouseover', e => {
    const chip = e.target.closest('[data-uu-name]');
    if (!chip) return;
    clearTimeout(hideTimer);
    tipName.textContent = chip.dataset.uuName || '';
    tipDesc.textContent = chip.dataset.uuDesc || '';
    tip.style.display = 'block';
    positionTip(e);
  });
  document.addEventListener('mousemove', e => {
    if (e.target.closest('[data-uu-name]')) positionTip(e);
  });
  document.addEventListener('mouseout', e => {
    if (!e.target.closest('[data-uu-name]')) return;
    hideTimer = setTimeout(() => { tip.style.display = 'none'; }, 80);
  });
  function positionTip(e) {
    const pad=12, tw=tip.offsetWidth||260, th=tip.offsetHeight||60;
    let x=e.clientX+pad, y=e.clientY+pad;
    if (x+tw>window.innerWidth-8) x=e.clientX-tw-pad;
    if (y+th>window.innerHeight-8) y=e.clientY-th-pad;
    tip.style.left=x+'px'; tip.style.top=y+'px';
  }
})();
</script>
<div id="uu-tooltip"><div class="tt-name"></div><div class="tt-desc"></div></div>
</body>
